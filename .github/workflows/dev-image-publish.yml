name: Dev Image Publish

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/dev-image-publish.yml
      - apps/api/**
      - apps/runtime/**
      - apps/sandbox/**
      - apps/provider-gateway/**
      - apps/web/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .dockerignore
      - scripts/ci/**
  workflow_dispatch:
    inputs:
      base_sha:
        description: "Optional base commit SHA for affected detection when manually dispatching."
        required: false
        type: string

jobs:
  detect-affected:
    runs-on: ubuntu-latest
    outputs:
      migration_changed: ${{ steps.detect.outputs.migration_changed }}
      deploy_services_json: ${{ steps.detect.outputs.deploy_services_json }}
      deploy_service_names_csv: ${{ steps.detect.outputs.deploy_service_names_csv }}
      summary: ${{ steps.detect.outputs.summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Detect affected deploy services
        id: detect
        env:
          BASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.base_sha || github.event.before }}
          HEAD_REF: ${{ github.sha }}
        run: |
          node scripts/ci/detect-affected.mjs \
            --event "${{ github.event_name }}" \
            --base "${BASE_REF}" \
            --head "${HEAD_REF}" \
            --github-output "$GITHUB_OUTPUT" \
            --github-step-summary "$GITHUB_STEP_SUMMARY"

  build-and-push:
    if: ${{ needs.detect-affected.outputs.deploy_services_json != '[]' }}
    needs:
      - detect-affected
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      GAR_REGION: ${{ vars.GAR_REGION }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
      GCP_WIF_SERVICE_ACCOUNT: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_CLERK_PROXY_URL: ${{ vars.NEXT_PUBLIC_CLERK_PROXY_URL }}
      MAIN_TAG: dev-main
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect-affected.outputs.deploy_services_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate required CI configuration
        run: |
          set -eu
          test -n "${GAR_REGION}" || (echo "Missing repo variable GAR_REGION" && exit 1)
          test -n "${GCP_PROJECT_ID}" || (echo "Missing repo variable GCP_PROJECT_ID" && exit 1)
          test -n "${GAR_REPOSITORY}" || (echo "Missing repo variable GAR_REPOSITORY" && exit 1)
          test -n "${GCP_WIF_PROVIDER}" || (echo "Missing repo variable GCP_WIF_PROVIDER" && exit 1)
          test -n "${GCP_WIF_SERVICE_ACCOUNT}" || (echo "Missing repo variable GCP_WIF_SERVICE_ACCOUNT" && exit 1)

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Resolve Docker build args
        id: build-args
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.buildArgs }}" in
            "")
              {
                echo "build_args<<EOF"
                echo ""
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
              ;;
            "web")
              test -n "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" || (echo "Missing NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" && exit 1)
              test -n "${NEXT_PUBLIC_CLERK_PROXY_URL}" || (echo "Missing NEXT_PUBLIC_CLERK_PROXY_URL" && exit 1)
              {
                echo "build_args<<EOF"
                echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}"
                echo "NEXT_PUBLIC_CLERK_PROXY_URL=${NEXT_PUBLIC_CLERK_PROXY_URL}"
                echo "NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in"
                echo "NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown buildArgs marker: ${{ matrix.buildArgs }}" >&2
              exit 1
              ;;
          esac

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ steps.build-args.outputs.build_args }}
          no-cache: ${{ matrix.service == 'api' }}
          tags: |
            ${{ env.GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ matrix.service }}:${{ env.MAIN_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ADR-104 D2: marker written only after a successful build+push, so its
      # presence proves this service's image exists in the registry.
      - name: Record successful build marker
        shell: bash
        run: |
          set -eu
          mkdir -p marker
          printf '%s' "${{ matrix.service }}" > "marker/${{ matrix.service }}.txt"

      - name: Upload build success marker
        uses: actions/upload-artifact@v4
        with:
          name: built-${{ matrix.service }}
          path: marker/${{ matrix.service }}.txt
          retention-days: 1

  pin-approved-migration-values-tag:
    if: ${{ github.event_name == 'push' && needs.detect-affected.outputs.deploy_services_json != '[]' && needs.detect-affected.outputs.migration_changed == 'true' }}
    needs:
      - detect-affected
      - build-and-push
    runs-on: ubuntu-latest
    environment:
      name: persai-dev-migrations
    permissions:
      contents: write
      id-token: write
    env:
      GAR_REGION: ${{ vars.GAR_REGION }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
      GCP_WIF_SERVICE_ACCOUNT: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
      TARGET_SHA: ${{ github.sha }}
      TARGET_SERVICES: ${{ needs.detect-affected.outputs.deploy_service_names_csv }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate rollout request
        run: |
          set -eu
          test -n "${TARGET_SHA}" || (echo "Missing target SHA" && exit 1)
          test -n "${TARGET_SERVICES}" || (echo "Missing target services" && exit 1)
          git rev-parse --verify "${TARGET_SHA}^{commit}" > /dev/null
          node scripts/ci/pin-dev-image-tags.mjs \
            --file infra/helm/values-dev.yaml \
            --sha "${TARGET_SHA}" \
            --services "${TARGET_SERVICES}" \
            --dry-run

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Verify approved images exist
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -ra SERVICES <<< "${TARGET_SERVICES}"
          for service in "${SERVICES[@]}"; do
            service_trimmed="$(echo "${service}" | xargs)"
            test -n "${service_trimmed}" || continue
            image="${GAR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${service_trimmed}:${TARGET_SHA}"
            echo "Verifying ${image}"
            docker manifest inspect "${image}" > /dev/null
          done

      - name: Pin approved migration rollout tags
        run: |
          set -eu
          node scripts/ci/pin-dev-image-tags.mjs \
            --file infra/helm/values-dev.yaml \
            --sha "${TARGET_SHA}" \
            --services "${TARGET_SERVICES}"

      - name: Commit and push approved rollout pin
        run: |
          set -eu
          if git diff --quiet -- infra/helm/values-dev.yaml; then
            echo "No values-dev tag change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/helm/values-dev.yaml
          git commit -m "chore(dev-gitops): approve migration rollout for ${TARGET_SHA}"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto origin/main and retrying..."
            git pull --rebase origin main
          done

          echo "Failed to push values-dev rollout update after retries." >&2
          exit 1

      - name: Summarize rollout verification follow-up
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Migration rollout pinned after approval

          Approved migration rollout for \`${TARGET_SERVICES}\` at \`${TARGET_SHA}\`.

          Recommended follow-up:

          \`\`\`bash
          kubectl get applications.argoproj.io -n argocd
          kubectl -n persai-dev get deploy,svc,ingress,networkpolicy
          kubectl -n persai-dev get pods -o wide
          kubectl -n persai-dev get jobs -l app.kubernetes.io/name=api-migrate
          kubectl -n persai-dev logs job/api-migrate --tail=120
          \`\`\`
          EOF

  pin-dev-values-tag:
    # ADR-104 D2: run even if some matrix legs failed (always()) so that the
    # services that DID build successfully still roll forward. Guarded to push,
    # a non-empty deploy list, the non-migration path, and a successful detect.
    if: ${{ always() && needs.detect-affected.result == 'success' && github.event_name == 'push' && needs.detect-affected.outputs.deploy_services_json != '[]' && needs.detect-affected.outputs.migration_changed != 'true' }}
    needs:
      - detect-affected
      - build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ADR-104 D2: collect the per-service success markers produced by the
      # build matrix. Only services whose build+push succeeded have a marker.
      - name: Download build success markers
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: built-*
          path: built-markers
          merge-multiple: true

      - name: Compute successfully-built services
        id: succeeded
        shell: bash
        run: |
          set -euo pipefail
          csv=""
          if [ -d built-markers ]; then
            for f in built-markers/*.txt; do
              [ -f "$f" ] || continue
              svc="$(tr -d '[:space:]' < "$f")"
              [ -n "$svc" ] || continue
              if [ -z "$csv" ]; then csv="$svc"; else csv="$csv,$svc"; fi
            done
          fi
          echo "csv=$csv" >> "$GITHUB_OUTPUT"
          echo "Successfully-built services to pin: ${csv:-<none>}"

      - name: Pin successfully-built dev Helm image tags to current commit SHA
        if: ${{ steps.succeeded.outputs.csv != '' }}
        env:
          DEPLOY_SERVICES: ${{ steps.succeeded.outputs.csv }}
        run: |
          set -eu
          node scripts/ci/pin-dev-image-tags.mjs \
            --file infra/helm/values-dev.yaml \
            --sha "${GITHUB_SHA}" \
            --services "${DEPLOY_SERVICES}"

      - name: Commit and push values-dev tag update
        if: ${{ steps.succeeded.outputs.csv != '' }}
        run: |
          set -eu
          if git diff --quiet -- infra/helm/values-dev.yaml; then
            echo "No values-dev tag change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/helm/values-dev.yaml
          git commit -m "chore(dev-gitops): pin affected image tags to ${GITHUB_SHA}"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto origin/main and retrying..."
            git pull --rebase origin main
          done

          echo "Failed to push values-dev tag update after retries." >&2
          exit 1
