name: Dev Image Publish

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/dev-image-publish.yml
      - apps/api/**
      - apps/runtime/**
      - apps/sandbox/**
      - apps/provider-gateway/**
      - apps/web/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .dockerignore
      - scripts/ci/**
  workflow_dispatch:

jobs:
  detect-affected:
    runs-on: ubuntu-latest
    outputs:
      migration_changed: ${{ steps.detect.outputs.migration_changed }}
      deploy_services_json: ${{ steps.detect.outputs.deploy_services_json }}
      deploy_service_names_csv: ${{ steps.detect.outputs.deploy_service_names_csv }}
      summary: ${{ steps.detect.outputs.summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Detect affected deploy services
        id: detect
        env:
          BASE_REF: ${{ github.event.before }}
          HEAD_REF: ${{ github.sha }}
        run: |
          node scripts/ci/detect-affected.mjs \
            --event "${{ github.event_name }}" \
            --base "${BASE_REF}" \
            --head "${HEAD_REF}" \
            --github-output "$GITHUB_OUTPUT" \
            --github-step-summary "$GITHUB_STEP_SUMMARY"

  build-and-push:
    if: ${{ needs.detect-affected.outputs.deploy_services_json != '[]' }}
    needs:
      - detect-affected
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      GAR_REGION: ${{ vars.GAR_REGION }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
      GCP_WIF_SERVICE_ACCOUNT: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
      MAIN_TAG: dev-main
    strategy:
      matrix:
        include: ${{ fromJSON(needs.detect-affected.outputs.deploy_services_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate required CI configuration
        run: |
          set -eu
          test -n "${GAR_REGION}" || (echo "Missing repo variable GAR_REGION" && exit 1)
          test -n "${GCP_PROJECT_ID}" || (echo "Missing repo variable GCP_PROJECT_ID" && exit 1)
          test -n "${GAR_REPOSITORY}" || (echo "Missing repo variable GAR_REPOSITORY" && exit 1)
          test -n "${GCP_WIF_PROVIDER}" || (echo "Missing repo variable GCP_WIF_PROVIDER" && exit 1)
          test -n "${GCP_WIF_SERVICE_ACCOUNT}" || (echo "Missing repo variable GCP_WIF_SERVICE_ACCOUNT" && exit 1)

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.buildArgs }}
          tags: |
            ${{ env.GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ matrix.service }}:${{ env.MAIN_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  pin-dev-values-tag:
    if: ${{ github.event_name == 'push' && needs.detect-affected.outputs.deploy_services_json != '[]' }}
    needs:
      - detect-affected
      - build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Pin affected dev Helm image tags to current commit SHA
        env:
          DEPLOY_SERVICES: ${{ needs.detect-affected.outputs.deploy_service_names_csv }}
        run: |
          set -eu
          node scripts/ci/pin-dev-image-tags.mjs \
            --file infra/helm/values-dev.yaml \
            --sha "${GITHUB_SHA}" \
            --services "${DEPLOY_SERVICES}"

      - name: Commit and push values-dev tag update
        run: |
          set -eu
          if git diff --quiet -- infra/helm/values-dev.yaml; then
            echo "No values-dev tag change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/helm/values-dev.yaml
          git commit -m "chore(dev-gitops): pin affected image tags to ${GITHUB_SHA}"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto origin/main and retrying..."
            git pull --rebase origin main
          done

          echo "Failed to push values-dev tag update after retries." >&2
          exit 1
