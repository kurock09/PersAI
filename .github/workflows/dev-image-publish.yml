name: Dev Image Publish

on:
  push:
    branches:
      - main
    paths-ignore:
      - infra/helm/values-dev.yaml
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      GAR_REGION: ${{ vars.GAR_REGION }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
      GCP_WIF_SERVICE_ACCOUNT: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
      MAIN_TAG: dev-main
    strategy:
      matrix:
        include:
          - image: api
            dockerfile: apps/api/Dockerfile
          - image: web
            dockerfile: apps/web/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required CI configuration
        run: |
          set -eu
          test -n "${GAR_REGION}" || (echo "Missing repo variable GAR_REGION" && exit 1)
          test -n "${GCP_PROJECT_ID}" || (echo "Missing repo variable GCP_PROJECT_ID" && exit 1)
          test -n "${GAR_REPOSITORY}" || (echo "Missing repo variable GAR_REPOSITORY" && exit 1)
          test -n "${GCP_WIF_PROVIDER}" || (echo "Missing repo variable GCP_WIF_PROVIDER" && exit 1)
          test -n "${GCP_WIF_SERVICE_ACCOUNT}" || (echo "Missing repo variable GCP_WIF_SERVICE_ACCOUNT" && exit 1)

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push ${{ matrix.image }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ matrix.image }}:${{ env.MAIN_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  pin-dev-values-tag:
    if: ${{ github.event_name == 'push' }}
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pin dev Helm image tag to current commit SHA
        run: |
          set -eu
          awk -v sha="${GITHUB_SHA}" '
            /^global:$/ { in_global=1 }
            in_global && /^[^ ]/ && $0 !~ /^global:$/ { in_global=0 }
            in_global && /^    tag:/ { sub(/^    tag:.*/, "    tag: " sha); replaced+=1 }
            { print }
            END {
              if (replaced != 1) {
                print "Expected to update exactly one global.images.tag line, updated " replaced "." > "/dev/stderr"
                exit 1
              }
            }
          ' infra/helm/values-dev.yaml > infra/helm/values-dev.yaml.tmp
          mv infra/helm/values-dev.yaml.tmp infra/helm/values-dev.yaml

      - name: Commit and push values-dev tag update
        run: |
          set -eu
          if git diff --quiet -- infra/helm/values-dev.yaml; then
            echo "No values-dev tag change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/helm/values-dev.yaml
          git commit -m "chore(dev-gitops): pin dev image tag to ${GITHUB_SHA}"
          git push origin HEAD:main
