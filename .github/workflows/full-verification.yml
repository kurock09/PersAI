name: Full Verification

on:
  merge_group:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  full-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: persai_v2
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d persai_v2"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/persai_v2?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Helm Lint
        run: |
          helm lint infra/helm -f infra/helm/values-dev.yaml
          helm template persai-dev infra/helm -f infra/helm/values-dev.yaml > /dev/null
          node --test scripts/ci/adr152-rollout-order.test.mjs

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Prisma Generate
        run: pnpm run prisma:generate

      - name: Prisma Migrate Check
        run: pnpm run prisma:migrate:check

      - name: ADR-146 Slice 5 Audit
        run: pnpm run test:adr146-slice5

      - name: Test
        run: pnpm run test

      - name: Step 2 Smoke/E2E
        run: pnpm run test:step2

      - name: Build
        run: pnpm run build
