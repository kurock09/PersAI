name: Dev Migration Rollout

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA whose already-published images should be pinned into dev GitOps
        required: true
        type: string
      services:
        description: Comma-separated service list to pin (for example api,runtime,sandbox)
        required: true
        type: string

jobs:
  pin-migration-rollout:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      GAR_REGION: ${{ vars.GAR_REGION }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
      GCP_WIF_SERVICE_ACCOUNT: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
      TARGET_SHA: ${{ inputs.sha }}
      TARGET_SERVICES: ${{ inputs.services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate rollout request
        run: |
          set -eu
          test -n "${TARGET_SHA}" || (echo "Missing required sha input" && exit 1)
          test -n "${TARGET_SERVICES}" || (echo "Missing required services input" && exit 1)
          git rev-parse --verify "${TARGET_SHA}^{commit}" > /dev/null
          node scripts/ci/pin-dev-image-tags.mjs \
            --file infra/helm/values-dev.yaml \
            --sha "${TARGET_SHA}" \
            --services "${TARGET_SERVICES}" \
            --dry-run

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Verify pinned images exist
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -ra SERVICES <<< "${TARGET_SERVICES}"
          for service in "${SERVICES[@]}"; do
            service_trimmed="$(echo "${service}" | xargs)"
            test -n "${service_trimmed}" || continue
            image="${GAR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${service_trimmed}:${TARGET_SHA}"
            echo "Verifying ${image}"
            docker manifest inspect "${image}" > /dev/null
          done

      - name: Pin dev Helm image tags to approved SHA
        run: |
          set -eu
          node scripts/ci/pin-dev-image-tags.mjs \
            --file infra/helm/values-dev.yaml \
            --sha "${TARGET_SHA}" \
            --services "${TARGET_SERVICES}"

      - name: Commit and push rollout pin
        run: |
          set -eu
          if git diff --quiet -- infra/helm/values-dev.yaml; then
            echo "No values-dev tag change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/helm/values-dev.yaml
          git commit -m "chore(dev-gitops): approve migration rollout for ${TARGET_SHA}"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto origin/main and retrying..."
            git pull --rebase origin main
          done

          echo "Failed to push values-dev rollout update after retries." >&2
          exit 1

      - name: Summarize rollout verification follow-up
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Migration rollout pinned

          Pinned \`${TARGET_SERVICES}\` to \`${TARGET_SHA}\` in \`infra/helm/values-dev.yaml\`.

          Recommended follow-up:

          \`\`\`bash
          kubectl get applications.argoproj.io -n argocd
          kubectl -n persai-dev get deploy,svc,ingress,networkpolicy
          kubectl -n persai-dev get pods -o wide
          kubectl -n persai-dev get jobs -l app.kubernetes.io/name=api-migrate
          kubectl -n persai-dev logs job/api-migrate --tail=120
          \`\`\`
          EOF
