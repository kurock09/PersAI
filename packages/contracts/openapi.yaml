        mediaCompletionVisionEnabled:
          type: boolean
          default: false
          description: >-
            When `true`, async `image_generate` / `image_edit` completion
            framing may attach produced (and for edit, source) image bytes for
            one multimodal review turn before delivery.
        videoVcoinMonthlyGrant:
          type: integer
          minimum: 0
          description: >-
            ADR-108 Slice 1 — monthly Vcoin grant credited into
            `WorkspaceVcoinBalance` on subscription period boundary for plans
            whose users get a recurring `video_generate` Vcoin budget.
            Default 0 ⇒ no grant. Slice 1 only round-trips the value; Slice 3
            owns the granting service; Slice 5 owns the admin UI flip.
        runtimeTierDefault:
          allOf:
            - $ref: "#/components/schemas/RuntimeTier"
          nullable: true
