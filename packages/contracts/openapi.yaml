openapi: 3.0.3
info:
  title: PersAI Step 2 API Contract
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /assistant:
    get:
      operationId: getAssistant
      summary: Get current authenticated user assistant lifecycle state
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current assistant state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/plan-visibility:
    get:
      operationId: getAssistantPlanVisibility
      summary: Get user-facing effective plan and limit visibility
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User-facing plan visibility
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantPlanVisibilityResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: postAssistantCreate
      summary: Create assistant for current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Created assistant state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Assistant already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/draft:
    patch:
      operationId: patchAssistantDraft
      summary: Update current authenticated user assistant draft fields
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantDraftUpdateRequest"
      responses:
        "200":
          description: Updated assistant state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/publish:
    post:
      operationId: postAssistantPublish
      summary: Publish current authenticated user assistant draft to immutable version
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Assistant state with latest published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Concurrent publish conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/rollback:
    post:
      operationId: postAssistantRollback
      summary: Rollback assistant by publishing a snapshot of a previous version
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantRollbackRequest"
      responses:
        "200":
          description: Assistant state with new rolled-back latest published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or target version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Rollback conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/reset:
    post:
      operationId: postAssistantReset
      summary: Reset assistant to a new blank state while preserving attachments
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Assistant state with new reset latest published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/reapply:
    post:
      operationId: postAssistantReapply
      summary: Reapply latest materialized published assistant spec to runtime
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Assistant state after reapply attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or published version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/runtime/preflight:
    get:
      operationId: getAssistantRuntimePreflight
      summary: Check OpenClaw runtime preflight health/readiness via adapter
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Runtime preflight state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantRuntimePreflightResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/chat/web:
    post:
      operationId: postAssistantWebChatTurn
      summary: Send one web chat turn through backend transport and adapter boundary
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantWebChatTurnRequest"
      responses:
        "200":
          description: Transport result with canonical chat records and runtime response metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantWebChatTransportResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Assistant transport unavailable due to lifecycle/apply state or active web chats cap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/chat/web/stream:
    post:
      operationId: postAssistantWebChatTurnStream
      summary: Send one web chat turn via streaming-first transport
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantWebChatTurnRequest"
      responses:
        "200":
          description: Streaming SSE response with started/delta/runtime_done/completed/interrupted/failed events
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Assistant transport unavailable due to lifecycle/apply state or active web chats cap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/chats/web:
    get:
      operationId: getAssistantWebChats
      summary: List web chat records for current assistant
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Web chat list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantWebChatListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/chats/web/{chatId}:
    patch:
      operationId: patchAssistantWebChat
      summary: Rename web chat record
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: chatId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantWebChatRenameRequest"
      responses:
        "200":
          description: Updated web chat list item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantWebChatListItemResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or web chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteAssistantWebChat
      summary: Hard delete web chat with explicit confirmation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: chatId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantWebChatDeleteRequest"
      responses:
        "200":
          description: Hard delete completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAssistantWebChatResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or web chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/chats/web/{chatId}/archive:
    post:
      operationId: postAssistantWebChatArchive
      summary: Archive web chat record
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: chatId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Archived web chat list item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantWebChatListItemResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or web chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/memory/items:
    get:
      operationId: getAssistantMemoryItems
      summary: List active Memory Center items for the current assistant
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Memory registry items (user-facing summaries, not raw runtime memory)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantMemoryItemsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/memory/items/{itemId}/forget:
    post:
      operationId: postAssistantMemoryItemForget
      summary: Forget (soft-remove) one Memory Center item from the user's list
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Item forgotten
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostAssistantMemoryItemForgetResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/memory/do-not-remember:
    post:
      operationId: postAssistantMemoryDoNotRemember
      summary: Request to stop treating a web chat turn as remembered; updates control-plane markers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantMemoryDoNotRememberRequest"
      responses:
        "200":
          description: Do-not-remember applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostAssistantMemoryDoNotRememberResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or messages not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/tasks/items:
    get:
      operationId: getAssistantTaskItems
      summary: List Tasks Center items for the current assistant (control-plane registry, not raw runtime)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Task registry items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantTaskItemsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/tasks/items/{itemId}/disable:
    post:
      operationId: postAssistantTaskItemDisable
      summary: Pause an active task or reminder (control-plane)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Task paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostAssistantTaskItemDisableResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Policy or state conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/tasks/items/{itemId}/enable:
    post:
      operationId: postAssistantTaskItemEnable
      summary: Resume a paused task or reminder (control-plane)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Task resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostAssistantTaskItemEnableResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Policy or state conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/tasks/items/{itemId}/cancel:
    post:
      operationId: postAssistantTaskItemCancel
      summary: Stop a task or reminder permanently (control-plane)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Task cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostAssistantTaskItemCancelResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Policy conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /admin/plans:
    get:
      operationId: getAdminPlans
      summary: List plan catalog entries for admin management
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin plan list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAdminPlansResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden (workspace owner required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: postAdminPlanCreate
      summary: Create plan catalog entry with entitlement controls
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPlanCreateRequest"
      responses:
        "200":
          description: Created plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostAdminPlanResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden (workspace owner required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Plan code conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /admin/plans/visibility:
    get:
      operationId: getAdminPlanVisibility
      summary: Get admin-facing plan visibility and usage pressure
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin visibility snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAdminPlanVisibilityResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden (workspace owner required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /admin/plans/{code}:
    patch:
      operationId: patchAdminPlan
      summary: Update admin plan metadata, trial flags, and entitlement controls
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPlanUpdateRequest"
      responses:
        "200":
          description: Updated plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostAdminPlanResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden (workspace owner required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /me:
    get:
      operationId: getMe
      summary: Get current authenticated app user state
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /me/onboarding:
    post:
      operationId: postMeOnboarding
      summary: Upsert onboarding data for authenticated app user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingRequest"
      responses:
        "200":
          description: Updated current user state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMeResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OnboardingRequest:
      type: object
      required:
        - displayName
        - workspaceName
        - locale
        - timezone
      properties:
        displayName:
          type: string
        workspaceName:
          type: string
        locale:
          type: string
        timezone:
          type: string
    WorkspaceSummary:
      type: object
      required:
        - id
        - name
        - locale
        - timezone
        - status
        - role
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        locale:
          type: string
        timezone:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
        role:
          type: string
          enum:
            - owner
            - member
    AppUserSummary:
      type: object
      required:
        - id
        - clerkUserId
        - email
      properties:
        id:
          type: string
          format: uuid
        clerkUserId:
          type: string
        email:
          type: string
        displayName:
          type: string
          nullable: true
    OnboardingState:
      type: object
      required:
        - isComplete
        - status
      properties:
        isComplete:
          type: boolean
        status:
          type: string
          enum:
            - completed
            - pending
    CurrentMeState:
      type: object
      required:
        - appUser
        - onboarding
        - workspace
      properties:
        appUser:
          $ref: "#/components/schemas/AppUserSummary"
        onboarding:
          $ref: "#/components/schemas/OnboardingState"
        workspace:
          allOf:
            - $ref: "#/components/schemas/WorkspaceSummary"
          nullable: true
    GetMeResponse:
      type: object
      required:
        - me
      properties:
        requestId:
          type: string
          nullable: true
        me:
          $ref: "#/components/schemas/CurrentMeState"
    AssistantDraftState:
      type: object
      required:
        - displayName
        - instructions
        - updatedAt
      properties:
        displayName:
          type: string
          nullable: true
        instructions:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    AssistantPublishedVersionSnapshotState:
      type: object
      required:
        - displayName
        - instructions
      properties:
        displayName:
          type: string
          nullable: true
        instructions:
          type: string
          nullable: true
    AssistantPublishedVersionState:
      type: object
      required:
        - id
        - version
        - publishedByUserId
        - publishedAt
        - snapshot
      properties:
        id:
          type: string
          format: uuid
        version:
          type: integer
          minimum: 1
        publishedByUserId:
          type: string
          format: uuid
        publishedAt:
          type: string
          format: date-time
        snapshot:
          $ref: "#/components/schemas/AssistantPublishedVersionSnapshotState"
    AssistantRuntimeApplyStatus:
      type: string
      enum:
        - not_requested
        - pending
        - in_progress
        - succeeded
        - failed
        - degraded
    AssistantRuntimeApplyErrorState:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
    AssistantRuntimeApplyState:
      type: object
      required:
        - status
        - targetPublishedVersionId
        - appliedPublishedVersionId
        - requestedAt
        - startedAt
        - finishedAt
        - error
      properties:
        status:
          $ref: "#/components/schemas/AssistantRuntimeApplyStatus"
        targetPublishedVersionId:
          type: string
          format: uuid
          nullable: true
        appliedPublishedVersionId:
          type: string
          format: uuid
          nullable: true
        requestedAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/AssistantRuntimeApplyErrorState"
          nullable: true
    AssistantGovernanceState:
      type: object
      required:
        - capabilityEnvelope
        - secretRefs
        - policyEnvelope
        - memoryControl
        - tasksControl
        - quotaPlanCode
        - quotaHook
        - auditHook
        - platformManagedUpdatedAt
      properties:
        capabilityEnvelope:
          type: object
          additionalProperties: true
          nullable: true
        secretRefs:
          type: object
          additionalProperties: true
          nullable: true
        policyEnvelope:
          type: object
          additionalProperties: true
          nullable: true
        memoryControl:
          description: >
            Step 6 D1 control-plane memory governance envelope (policy, provenance hooks,
            visibility hooks, forget-request markers, audit routing). Not raw OpenClaw/runtime memory.
          type: object
          additionalProperties: true
          nullable: true
        tasksControl:
          description: >
            Step 6 D4 control-plane tasks/reminders/triggers governance (ownership, source/surface hooks,
            control lifecycle labels, enable/disable/cancel flags, commercial quota exclusion for tasks,
            audit routing). OpenClaw owns execution and scheduling; PersAI does not run a backend scheduler here.
          type: object
          additionalProperties: true
          nullable: true
        quotaPlanCode:
          type: string
          nullable: true
        quotaHook:
          type: object
          additionalProperties: true
          nullable: true
        auditHook:
          type: object
          additionalProperties: true
          nullable: true
        platformManagedUpdatedAt:
          type: string
          format: date-time
          nullable: true
    AssistantMaterializationState:
      type: object
      required:
        - latestSpecId
        - publishedVersionId
        - sourceAction
        - algorithmVersion
        - contentHash
        - generatedAt
        - openclawBootstrapDocument
        - openclawWorkspaceDocument
      properties:
        latestSpecId:
          type: string
          format: uuid
          nullable: true
        publishedVersionId:
          type: string
          format: uuid
          nullable: true
        sourceAction:
          type: string
          enum:
            - publish
            - rollback
            - reset
          nullable: true
        algorithmVersion:
          type: integer
          nullable: true
        contentHash:
          type: string
          nullable: true
        generatedAt:
          type: string
          format: date-time
          nullable: true
        openclawBootstrapDocument:
          type: string
          nullable: true
        openclawWorkspaceDocument:
          type: string
          nullable: true
    AssistantMemoryRegistrySourceType:
