openapi: 3.0.3
info:
  title: PersAI Step 2 API Contract
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /assistant:
    get:
      operationId: getAssistant
      summary: Get current authenticated user assistant lifecycle state
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current assistant state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/plan-visibility:
    get:
      operationId: getAssistantPlanVisibility
      summary: Get user-facing effective plan and limit visibility
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User-facing plan visibility
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantPlanVisibilityResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: postAssistantCreate
      summary: Create assistant for current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Created assistant state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Assistant already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/draft:
    patch:
      operationId: patchAssistantDraft
      summary: Update current authenticated user assistant draft fields
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantDraftUpdateRequest"
      responses:
        "200":
          description: Updated assistant state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/publish:
    post:
      operationId: postAssistantPublish
      summary: Publish current authenticated user assistant draft to immutable version
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Assistant state with latest published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Concurrent publish conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/rollback:
    post:
      operationId: postAssistantRollback
      summary: Rollback assistant by publishing a snapshot of a previous version
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantRollbackRequest"
      responses:
        "200":
          description: Assistant state with new rolled-back latest published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or target version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Rollback conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/reset:
    post:
      operationId: postAssistantReset
      summary: Reset assistant to a new blank state while preserving attachments
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Assistant state with new reset latest published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/reapply:
    post:
      operationId: postAssistantReapply
      summary: Reapply latest materialized published assistant spec to runtime
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Assistant state after reapply attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or published version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/runtime/preflight:
    get:
      operationId: getAssistantRuntimePreflight
      summary: Check OpenClaw runtime preflight health/readiness via adapter
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Runtime preflight state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantRuntimePreflightResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/integrations/telegram:
    get:
      operationId: getAssistantTelegramIntegration
      summary: Get Telegram integration connection/config state for current assistant
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Telegram integration state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantTelegramIntegrationResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/integrations/telegram/connect:
    post:
      operationId: postAssistantTelegramConnect
      summary: Verify and connect Telegram bot token for current assistant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantTelegramConnectRequest"
      responses:
        "200":
          description: Telegram integration connected state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantTelegramIntegrationResponse"
        "400":
          description: Validation or verification error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Telegram channel not allowed by effective capability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/integrations/telegram/rotate:
    post:
      operationId: postAssistantTelegramRotate
      summary: Rotate Telegram bot secret reference and reconnect current assistant binding
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantTelegramRotateRequest"
      responses:
        "200":
          description: Telegram integration state after secret rotation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantTelegramIntegrationResponse"
        "400":
          description: Validation or verification error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Telegram channel not allowed by effective capability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/integrations/telegram/revoke:
    post:
      operationId: postAssistantTelegramRevoke
      summary: Revoke Telegram secret reference and disable Telegram binding
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantTelegramSecretRevokeRequest"
      responses:
        "200":
          description: Telegram integration state after revoke
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantTelegramIntegrationResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Managed Telegram secret reference is not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/integrations/telegram/emergency-revoke:
    post:
      operationId: postAssistantTelegramEmergencyRevoke
      summary: Emergency revoke Telegram secret reference and disable Telegram binding immediately
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantTelegramSecretRevokeRequest"
      responses:
        "200":
          description: Telegram integration state after emergency revoke
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantTelegramIntegrationResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Managed Telegram secret reference is not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/integrations/telegram/config:
    patch:
      operationId: patchAssistantTelegramConfig
      summary: Update Telegram post-connect configuration for current assistant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantTelegramConfigUpdateRequest"
      responses:
        "200":
          description: Telegram integration state after config update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantTelegramIntegrationResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Telegram not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/chat/web:
    post:
      operationId: postAssistantWebChatTurn
      summary: Send one web chat turn through backend transport and adapter boundary
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantWebChatTurnRequest"
      responses:
        "200":
          description: Transport result with canonical chat records and runtime response metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantWebChatTransportResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Assistant transport unavailable due to lifecycle/apply state or active web chats cap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/chat/web/stream:
    post:
      operationId: postAssistantWebChatTurnStream
      summary: Send one web chat turn via streaming-first transport
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantWebChatTurnRequest"
      responses:
        "200":
          description: Streaming SSE response with started/delta/runtime_done/completed/interrupted/failed events
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Assistant transport unavailable due to lifecycle/apply state or active web chats cap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/chats/web:
    get:
      operationId: getAssistantWebChats
      summary: List web chat records for current assistant
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Web chat list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantWebChatListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/chats/web/{chatId}:
    patch:
      operationId: patchAssistantWebChat
      summary: Rename web chat record
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: chatId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantWebChatRenameRequest"
      responses:
        "200":
          description: Updated web chat list item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantWebChatListItemResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or web chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteAssistantWebChat
      summary: Hard delete web chat with explicit confirmation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: chatId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantWebChatDeleteRequest"
      responses:
        "200":
          description: Hard delete completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAssistantWebChatResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or web chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/chats/web/{chatId}/archive:
    post:
      operationId: postAssistantWebChatArchive
      summary: Archive web chat record
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: chatId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Archived web chat list item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantWebChatListItemResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or web chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/memory/items:
    get:
      operationId: getAssistantMemoryItems
      summary: List active Memory Center items for the current assistant
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Memory registry items (user-facing summaries, not raw runtime memory)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantMemoryItemsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/memory/items/{itemId}/forget:
    post:
      operationId: postAssistantMemoryItemForget
      summary: Forget (soft-remove) one Memory Center item from the user's list
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Item forgotten
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostAssistantMemoryItemForgetResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/memory/do-not-remember:
    post:
      operationId: postAssistantMemoryDoNotRemember
      summary: Request to stop treating a web chat turn as remembered; updates control-plane markers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantMemoryDoNotRememberRequest"
      responses:
        "200":
          description: Do-not-remember applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostAssistantMemoryDoNotRememberResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or messages not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/tasks/items:
    get:
      operationId: getAssistantTaskItems
      summary: List Tasks Center items for the current assistant (control-plane registry, not raw runtime)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Task registry items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantTaskItemsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
