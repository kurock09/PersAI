openapi: 3.0.3
info:
  title: PersAI Step 2 API Contract
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /assistant:
    get:
      operationId: getAssistant
      summary: Get current active assistant lifecycle state with workspace assistant metadata
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current active assistant state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Active assistant selection required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: postAssistantCreate
      summary: Create assistant for current workspace member
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Created assistant state with updated active assistant metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Assistant limit reached or create conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/list:
    get:
      operationId: getAssistantList
      summary: List assistants for the current workspace member
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Workspace assistant list and active selection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/switch:
    post:
      operationId: postAssistantSwitch
      summary: Switch the active assistant for the current workspace member
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantSwitchRequest"
      responses:
        "200":
          description: Switched active assistant state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found in current workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/plan-visibility:
    get:
      operationId: getAssistantPlanVisibility
      summary: Get user-facing effective plan and limit visibility
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User-facing plan visibility
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantPlanVisibilityResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/draft:
    patch:
      operationId: patchAssistantDraft
      summary: Update current authenticated user assistant draft fields
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantDraftUpdateRequest"
      responses:
        "200":
          description: Updated assistant state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/persona-archetypes:
    get:
      operationId: getAssistantPersonaArchetypes
      summary: List Voice DNA archetypes available for assistant setup
      description: |
        ADR-074 V1. Returns the catalogue of Voice DNA archetypes the
        assistant can pick from in onboarding and settings. Records are
        editable by admins via `/admin/persona-archetypes`; clients should
        always call this endpoint instead of hard-coding archetype rosters.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Available persona archetypes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantPersonaArchetypesResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/setup/preview:
    post:
      operationId: postAssistantSetupPreview
      summary: Generate a runtime-backed preview message for the current setup draft
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Setup preview response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostAssistantSetupPreviewResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Assistant preview unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/publish:
    post:
      operationId: postAssistantPublish
      summary: Publish current authenticated user assistant draft to immutable version
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Assistant state with latest published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Concurrent publish conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/rollback:
    post:
      operationId: postAssistantRollback
      summary: Rollback assistant by publishing a snapshot of a previous version
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantRollbackRequest"
      responses:
        "200":
          description: Assistant state with new rolled-back latest published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or target version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Rollback conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/reset:
    post:
      operationId: postAssistantReset
      summary: Reset assistant to a new blank state while preserving attachments
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Assistant state with new reset latest published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/reapply:
    post:
      operationId: postAssistantReapply
      summary: Reapply latest materialized published assistant spec to runtime
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Assistant state after reapply attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or published version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/knowledge-sources:
    get:
      operationId: getAssistantKnowledgeSources
      summary: List assistant-owned uploaded knowledge sources and current knowledge quota usage
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Knowledge source list with quota usage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantKnowledgeSourcesResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: postAssistantKnowledgeSourceUpload
      summary: Upload one document-like knowledge source for the current assistant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                displayName:
                  type: string
                  nullable: true
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Uploaded knowledge source state after initial indexing attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantKnowledgeSourceResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Knowledge storage quota exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/knowledge-sources/{sourceId}:
    get:
      operationId: getAssistantKnowledgeSource
      summary: Get one uploaded knowledge source and its current index status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: sourceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Knowledge source detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantKnowledgeSourceResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or knowledge source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteAssistantKnowledgeSource
      summary: Delete one uploaded knowledge source and release its reserved knowledge quota
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: sourceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Knowledge source deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAssistantKnowledgeSourceResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or knowledge source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/knowledge-sources/{sourceId}/reindex:
    post:
      operationId: postAssistantKnowledgeSourceReindex
      summary: Re-run indexing for one uploaded knowledge source
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: sourceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Knowledge source state after reindex attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantKnowledgeSourceResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or knowledge source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/runtime/preflight:
    get:
      operationId: getAssistantRuntimePreflight
      summary: Check PersAI native runtime preflight health/readiness
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Runtime preflight state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantRuntimePreflightResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/integrations/telegram:
    get:
      operationId: getAssistantTelegramIntegration
      summary: Get Telegram integration connection/config state for current assistant
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Telegram integration state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantTelegramIntegrationResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/integrations/telegram/connect:
    post:
      operationId: postAssistantTelegramConnect
      summary: Verify and connect Telegram bot token for current assistant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantTelegramConnectRequest"
      responses:
        "200":
          description: Telegram integration connected state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantTelegramIntegrationResponse"
        "400":
          description: Validation or verification error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Telegram channel not allowed by effective capability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/integrations/telegram/rotate:
    post:
      operationId: postAssistantTelegramRotate
      summary: Rotate Telegram bot secret reference and reconnect current assistant binding
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantTelegramRotateRequest"
      responses:
        "200":
          description: Telegram integration state after secret rotation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantTelegramIntegrationResponse"
        "400":
          description: Validation or verification error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Telegram channel not allowed by effective capability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/integrations/telegram/revoke:
    post:
      operationId: postAssistantTelegramRevoke
      summary: Revoke Telegram secret reference and disable Telegram binding
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantTelegramSecretRevokeRequest"
      responses:
        "200":
          description: Telegram integration state after revoke
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantTelegramIntegrationResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Managed Telegram secret reference is not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/integrations/telegram/emergency-revoke:
    post:
      operationId: postAssistantTelegramEmergencyRevoke
      summary: Emergency revoke Telegram secret reference and disable Telegram binding immediately
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantTelegramSecretRevokeRequest"
      responses:
        "200":
          description: Telegram integration state after emergency revoke
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantTelegramIntegrationResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Managed Telegram secret reference is not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/integrations/telegram/config:
    patch:
      operationId: patchAssistantTelegramConfig
      summary: Update Telegram post-connect configuration for current assistant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantTelegramConfigUpdateRequest"
      responses:
        "200":
          description: Telegram integration state after config update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantTelegramIntegrationResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Telegram not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/chat/web:
    post:
      operationId: postAssistantWebChatTurn
      summary: Send one web chat turn through backend transport and adapter boundary
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantWebChatTurnRequest"
      responses:
        "200":
          description: Transport result with canonical chat records and runtime response metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantWebChatTransportResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Assistant transport unavailable due to lifecycle/apply state or active web chats cap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Request slowed or temporarily blocked by abuse/rate-limit protection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/chat/web/stream:
    post:
      operationId: postAssistantWebChatTurnStream
      summary: Send one web chat turn via streaming-first transport
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantWebChatTurnRequest"
      responses:
