    AdminPlanContextPolicy:
      type: object
      required:
        - preset
        - targetContextBudget
        - compactionTriggerThreshold
        - keepRecentMinimum
        - knowledgeHydrationBudget
        - autoCompactionWeb
        - autoCompactionTelegram
        - crossSessionCarryOverTtlDays
        - crossSessionCarryOverIdleHours
        - crossSessionCarryOverCooldownHours
      properties:
        preset:
          type: string
          enum:
            - lean
            - balanced
            - rich
            - custom
        targetContextBudget:
          type: integer
        compactionTriggerThreshold:
          type: integer
        keepRecentMinimum:
          type: integer
        knowledgeHydrationBudget:
          type: integer
        sharedCompactionSummaryBudgetTokens:
          type: integer
        autoCompactionWeb:
          type: boolean
        autoCompactionTelegram:
          type: boolean
        crossSessionCarryOverTtlDays:
          type: integer
          minimum: 1
          maximum: 90
          description: |
            ADR-074 Slice M3 — maximum age (in days) of a previous-session
            synopsis or unresolved open-loop that is eligible for the turn-0
            cross-session carry-over block. Older items are silently dropped.
            Plan-policy tunable; the top-N synopsis cap (3) is a hard-coded
            constant per Principle 1 ("magic, not user-controlled").
        crossSessionCarryOverIdleHours:
          type: integer
          minimum: 1
          maximum: 168
          description: |
            ADR-074 Slice M3.2 — long-idle re-trigger window in hours. If the
            most recent stored user message in the current thread is older
            than this, the cross-session carry-over block fires again on the
            next turn (subject to crossSessionCarryOverCooldownHours). The
            brand-new thread sub-trigger is unaffected. Range 1..168 hours
            (1 hour … 7 days). Default 4.
        crossSessionCarryOverCooldownHours:
          type: integer
          minimum: 1
          maximum: 168
          description: |
            ADR-074 Slice M3.2 — per-thread cooldown between consecutive
            long-idle carry-over fires, in hours. After the block fires, the
            long-idle sub-trigger is muted for this many hours per thread,
            even if the idle window has otherwise elapsed. Does NOT apply to
            the brand-new thread sub-trigger (a fresh thread always fires).
            Range 1..168 hours (1 hour … 7 days). Default 12.
    AdminPlanRetrievalPolicy:
      type: object
      required:
