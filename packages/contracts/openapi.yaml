          type: integer
          minimum: 0
          description: >-
            ADR-108 Slice 6a. Monthly Vcoin grant credited at subscription
            period rollover. 0 means no monthly grant — users must purchase
            VC packages.
        vcoinExchangeRate:
          type: integer
          minimum: 1
          description: >-
            ADR-108 Slice 6a. Platform Vcoin exchange rate at the time of the
            response (VC per 1 USD).
        videoVcoinApproxVideosPerMonth:
          type: integer
          minimum: 0
          description: >-
            ADR-108 Slice 6a. Server-computed marketing approximation:
            floor(videoVcoinMonthlyGrant / ceil(avgUsdPerSecond × 5 ×
            vcoinExchangeRate)). Omitted when no time-metered video catalog
            rows are active OR when videoVcoinMonthlyGrant is 0.
