          type: integer
          nullable: true
          description: >-
            ADR-116 — `files` tool only. Max image edge (px) for preview
            resize. NULL = code default at materialize.
        fullProjection:
          type: boolean
          description: >-
            ADR-135 — when true, send the full tool description and input
            schema on every turn; when false, send a catalog stub and require
            `{tool}({action:"describe"})` before first real execution.
