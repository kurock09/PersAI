      type: object
      required:
        - toolCode
        - displayName
        - toolClass
        - policyClass
        - active
        - dailyCallLimit
        - perTurnCap
        - fullProjection
        - visibleInPlanEditor
      properties:
        toolCode:
          type: string
        displayName:
          type: string
        toolClass:
          type: string
          enum:
            - cost_driving
            - utility
        policyClass:
          type: string
          enum:
            - plan_managed
            - platform_managed
            - hidden_internal
        active:
          type: boolean
        dailyCallLimit:
          type: integer
          nullable: true
        perTurnCap:
          type: integer
          nullable: true
          description: >-
            ADR-074 Slice L1 — per-plan override of the per-turn hard cap on
            this tool's executions inside a single runtime turn. NULL means
            "use the runtime code default" (TOOL_HARD_CAP_PER_TURN in
            apps/runtime/src/modules/turns/tool-budget-policy.ts).
        maxFilePreviewBytes:
          type: integer
          nullable: true
          description: >-
            ADR-116 — `files` tool only. Max bytes for one visual preview
