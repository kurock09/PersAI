openapi: 3.0.3
info:
  title: PersAI Step 2 API Contract
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /assistant:
    get:
      operationId: getAssistant
      summary: Get current authenticated user assistant lifecycle state
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current assistant state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: postAssistantCreate
      summary: Create assistant for current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Created assistant state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Assistant already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/draft:
    patch:
      operationId: patchAssistantDraft
      summary: Update current authenticated user assistant draft fields
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantDraftUpdateRequest"
      responses:
        "200":
          description: Updated assistant state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/publish:
    post:
      operationId: postAssistantPublish
      summary: Publish current authenticated user assistant draft to immutable version
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Assistant state with latest published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Concurrent publish conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/rollback:
    post:
      operationId: postAssistantRollback
      summary: Rollback assistant by publishing a snapshot of a previous version
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantRollbackRequest"
      responses:
        "200":
          description: Assistant state with new rolled-back latest published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant or target version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Rollback conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /assistant/reset:
    post:
      operationId: postAssistantReset
      summary: Reset assistant to a new blank state while preserving attachments
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Assistant state with new reset latest published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssistantResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Assistant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /me:
    get:
      operationId: getMe
      summary: Get current authenticated app user state
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /me/onboarding:
    post:
      operationId: postMeOnboarding
      summary: Upsert onboarding data for authenticated app user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingRequest"
      responses:
        "200":
          description: Updated current user state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMeResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OnboardingRequest:
      type: object
      required:
        - displayName
        - workspaceName
        - locale
        - timezone
      properties:
        displayName:
          type: string
        workspaceName:
          type: string
        locale:
          type: string
        timezone:
          type: string
    WorkspaceSummary:
      type: object
      required:
        - id
        - name
        - locale
        - timezone
        - status
        - role
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        locale:
          type: string
        timezone:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
        role:
          type: string
          enum:
            - owner
            - member
    AppUserSummary:
      type: object
      required:
        - id
        - clerkUserId
        - email
      properties:
        id:
          type: string
          format: uuid
        clerkUserId:
          type: string
        email:
          type: string
        displayName:
          type: string
          nullable: true
    OnboardingState:
      type: object
      required:
        - isComplete
        - status
      properties:
        isComplete:
          type: boolean
        status:
          type: string
          enum:
            - completed
            - pending
    CurrentMeState:
      type: object
      required:
        - appUser
        - onboarding
        - workspace
      properties:
        appUser:
          $ref: "#/components/schemas/AppUserSummary"
        onboarding:
          $ref: "#/components/schemas/OnboardingState"
        workspace:
          allOf:
            - $ref: "#/components/schemas/WorkspaceSummary"
          nullable: true
    GetMeResponse:
      type: object
      required:
        - me
      properties:
        requestId:
          type: string
          nullable: true
        me:
          $ref: "#/components/schemas/CurrentMeState"
    AssistantDraftState:
      type: object
      required:
        - displayName
        - instructions
        - updatedAt
      properties:
        displayName:
          type: string
          nullable: true
        instructions:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    AssistantPublishedVersionSnapshotState:
      type: object
      required:
        - displayName
        - instructions
      properties:
        displayName:
          type: string
          nullable: true
        instructions:
          type: string
          nullable: true
    AssistantPublishedVersionState:
      type: object
      required:
        - id
        - version
        - publishedByUserId
        - publishedAt
        - snapshot
      properties:
        id:
          type: string
          format: uuid
        version:
          type: integer
          minimum: 1
        publishedByUserId:
          type: string
          format: uuid
        publishedAt:
          type: string
          format: date-time
        snapshot:
          $ref: "#/components/schemas/AssistantPublishedVersionSnapshotState"
    AssistantRuntimeApplyStatus:
      type: string
      enum:
        - not_requested
        - pending
        - in_progress
        - succeeded
        - failed
        - degraded
    AssistantRuntimeApplyErrorState:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
    AssistantRuntimeApplyState:
      type: object
      required:
        - status
        - targetPublishedVersionId
        - appliedPublishedVersionId
        - requestedAt
        - startedAt
        - finishedAt
        - error
      properties:
        status:
          $ref: "#/components/schemas/AssistantRuntimeApplyStatus"
        targetPublishedVersionId:
          type: string
          format: uuid
          nullable: true
        appliedPublishedVersionId:
          type: string
          format: uuid
          nullable: true
        requestedAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/AssistantRuntimeApplyErrorState"
          nullable: true
    AssistantLifecycleState:
      type: object
      required:
        - id
        - userId
        - workspaceId
        - draft
        - latestPublishedVersion
        - runtimeApply
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        draft:
          $ref: "#/components/schemas/AssistantDraftState"
        latestPublishedVersion:
          allOf:
            - $ref: "#/components/schemas/AssistantPublishedVersionState"
          nullable: true
        runtimeApply:
          $ref: "#/components/schemas/AssistantRuntimeApplyState"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AssistantDraftUpdateRequest:
      type: object
      minProperties: 1
      properties:
        displayName:
          type: string
          nullable: true
        instructions:
          type: string
          nullable: true
    AssistantRollbackRequest:
      type: object
      required:
        - targetVersion
      properties:
        targetVersion:
          type: integer
          minimum: 1
    GetAssistantResponse:
      type: object
      required:
        - assistant
      properties:
        requestId:
          type: string
          nullable: true
        assistant:
          $ref: "#/components/schemas/AssistantLifecycleState"
    ErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ErrorObject"
        requestId:
          type: string
          nullable: true
    ErrorObject:
      type: object
      required:
        - code
        - category
        - message
      properties:
        code:
          type: string
        category:
          type: string
          enum:
            - validation
            - auth
            - forbidden
            - conflict
            - infra
            - unknown
        message:
          type: string
        details:
          type: object
          additionalProperties: true
