  /workspaces/{workspaceId}/video-personas/voice-catalog:
    get:
      operationId: getWorkspaceHeygenVoiceCatalog
      summary: Get HeyGen voice catalog for workspace (ADR-109 Slice 9)
      description: >-
        Returns the platform HeyGen voice catalog (cached). Workspace ID is
        used for auth-scoping only; the underlying catalog is platform-wide.
        Returns `{ provider: "heygen", voices: [] }` when the catalog is
        unavailable (no HeyGen credential or empty cache).
      security:
        - bearerAuth: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Voice catalog (may be empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceHeygenVoiceCatalogState"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /workspaces/{workspaceId}/video-personas:
    post:
      operationId: createWorkspaceVideoPersona
      summary: Create a workspace video persona (ADR-109 Slice 5)
      description: >-
        Creates a new workspace-scoped video persona. Persona creation is
        REST-only (ADR-109 cross-slice invariant #14). Debits
        `heygenPersonaCreationVcoin` VC from the workspace wallet when the
        platform cost > 0. Portrait image is normalized and center-cropped
        server-side to the selected persona video format before the HeyGen
        avatar is created. Validates the provided `heygenVoiceId` against the
        cached HeyGen voice shortlist.
      security:
        - bearerAuth: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - portrait
                - displayName
                - heygenVoiceId
              properties:
                portrait:
                  type: string
                  format: binary
                  description: Portrait image file (JPEG, PNG, or WebP). Normalized to 1024×1024 JPEG server-side.
                displayName:
                  type: string
                  maxLength: 80
                  description: Display name for the persona. Must be unique within the workspace (case-insensitive).
                videoFormat:
                  type: string
                  enum:
                    - "16:9"
                    - "9:16"
                    - "1:1"
                  description: Stored persona video format. Determines portrait normalization/cropping before HeyGen avatar creation and acts as the default talking-avatar aspect ratio when the request does not explicitly choose one.
                heygenVoiceId:
                  type: string
                  maxLength: 128
                  description: HeyGen voice ID. Must exist in the cached HeyGen voice shortlist.
      responses:
        "201":
          description: Persona created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceVideoPersonaCreateResponse"
        "400":
          description: >-
            Bad request. Possible error codes: `persona_limit_reached`,
            `persona_duplicate_name`, `voice_not_found`,
            `vcoin_balance_exhausted`, `portrait_required`, `invalid_field`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    get:
      operationId: listWorkspaceVideoPersonas
      summary: List workspace video personas (ADR-109 Slice 5)
      description: Returns all non-archived personas for the workspace, ordered by creation date ascending.
      security:
        - bearerAuth: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of active personas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceVideoPersonaListState"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /workspaces/{workspaceId}/video-personas/{personaId}:
    delete:
      operationId: archiveWorkspaceVideoPersona
      summary: Archive (soft-delete) a workspace video persona (ADR-109 Slice 5)
      description: >-
        Soft-deletes the persona by setting `archived = true`. Does NOT call
        HeyGen API (Slice 6 owns the cascade delete). Does NOT refund the VC
        creation cost.
      security:
        - bearerAuth: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: personaId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Persona archived
          content:
            application/json:
              schema:
                type: object
                required:
                  - archived
                  - personaId
                properties:
                  archived:
                    type: boolean
                  personaId:
                    type: string
                    format: uuid
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Persona not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UpdateUserPreferencesRequest:
      type: object
      properties:
        preferredLocale:
          type: string
          enum:
            - en
            - ru
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
          nullable: true
      minProperties: 1
    OnboardingRequest:
      type: object
      required:
        - displayName
        - workspaceName
        - locale
        - timezone
        - acceptTermsOfService
        - acceptPrivacyPolicy
      properties:
        displayName:
          type: string
        workspaceName:
          type: string
        locale:
          type: string
        timezone:
          type: string
        birthday:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          enum:
            - male
            - female
            - other
          nullable: true
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
          nullable: true
        acceptTermsOfService:
          type: boolean
          enum: [true]
        acceptPrivacyPolicy:
          type: boolean
          enum: [true]
        termsOfServiceVersion:
          type: string
          maxLength: 64
          nullable: true
        privacyPolicyVersion:
          type: string
          maxLength: 64
          nullable: true
    WorkspaceSummary:
      type: object
      required:
        - id
        - name
        - locale
        - timezone
        - status
        - role
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        locale:
          type: string
        timezone:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
        role:
          type: string
          enum:
            - owner
            - member
    AppUserSummary:
      type: object
      required:
        - id
        - clerkUserId
        - email
        - resolvedLocale
      properties:
        id:
          type: string
          format: uuid
        clerkUserId:
          type: string
        email:
          type: string
        displayName:
          type: string
          nullable: true
        birthday:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          nullable: true
        preferredLocale:
          type: string
          enum:
            - en
            - ru
          nullable: true
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
          nullable: true
        resolvedLocale:
          type: string
          enum:
            - en
            - ru
    OnboardingState:
      type: object
      required:
        - isComplete
        - status
      properties:
        isComplete:
          type: boolean
        status:
          type: string
          enum:
            - completed
            - pending
    PublicSitePageSlug:
      type: string
      enum:
        - terms
        - privacy
        - requisites
        - contacts
    SitePageMarket:
      type: string
      enum:
        - rf
        - intl
    SitePageLocale:
      type: string
      enum:
        - ru
        - en
    SitePageStatus:
      type: string
      enum:
        - draft
        - published
    SitePageVariantState:
      type: object
      required:
        - market
        - locale
      properties:
        market:
          $ref: "#/components/schemas/SitePageMarket"
        locale:
          $ref: "#/components/schemas/SitePageLocale"
    PublicGeoHintState:
      type: object
      required:
        - suggestedCountryCode
      properties:
        suggestedCountryCode:
          type: string
          minLength: 2
          maxLength: 2
          nullable: true
    GetPublicGeoHintResponse:
      type: object
      required:
        - requestId
        - hint
      properties:
        requestId:
          type: string
          nullable: true
        hint:
          $ref: "#/components/schemas/PublicGeoHintState"
    PublicSitePageState:
      type: object
      required:
        - slug
        - market
        - locale
        - title
        - bodyMarkdown
        - status
        - version
        - publishedAt
        - updatedAt
        - availableVariants
      properties:
        slug:
          $ref: "#/components/schemas/PublicSitePageSlug"
        market:
          $ref: "#/components/schemas/SitePageMarket"
        locale:
          $ref: "#/components/schemas/SitePageLocale"
        title:
          type: string
        bodyMarkdown:
          type: string
        status:
          $ref: "#/components/schemas/SitePageStatus"
        version:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
        availableVariants:
          type: array
          items:
            $ref: "#/components/schemas/SitePageVariantState"
    GetPublicSitePageResponse:
      type: object
      required:
        - requestId
        - page
        - resolvedMarket
        - resolvedLocale
      properties:
        requestId:
          type: string
          nullable: true
        page:
          $ref: "#/components/schemas/PublicSitePageState"
        resolvedMarket:
          $ref: "#/components/schemas/SitePageMarket"
        resolvedLocale:
          $ref: "#/components/schemas/SitePageLocale"
    AdminSitePageState:
      allOf:
        - $ref: "#/components/schemas/PublicSitePageState"
        - type: object
          required:
            - createdAt
          properties:
            createdAt:
              type: string
              format: date-time
    GetAdminSitePagesResponse:
      type: object
      required:
        - requestId
        - pages
      properties:
        requestId:
          type: string
          nullable: true
        pages:
          type: array
          items:
            $ref: "#/components/schemas/AdminSitePageState"
    PutAdminSitePageRequest:
      type: object
      required:
        - market
        - locale
        - title
        - bodyMarkdown
      properties:
        market:
          $ref: "#/components/schemas/SitePageMarket"
        locale:
          $ref: "#/components/schemas/SitePageLocale"
        title:
          type: string
        bodyMarkdown:
          type: string
        version:
          type: string
          maxLength: 64
          nullable: true
    PutAdminSitePageResponse:
      type: object
      required:
        - requestId
        - page
      properties:
        requestId:
          type: string
          nullable: true
        page:
          $ref: "#/components/schemas/AdminSitePageState"
    PostAdminSitePagePublishRequest:
      type: object
      required:
        - market
        - locale
      properties:
        market:
          $ref: "#/components/schemas/SitePageMarket"
        locale:
          $ref: "#/components/schemas/SitePageLocale"
    PostAdminSitePagePublishResponse:
      type: object
      required:
        - requestId
        - page
      properties:
        requestId:
          type: string
          nullable: true
        page:
          $ref: "#/components/schemas/AdminSitePageState"
    ComplianceLegalAcceptanceState:
      type: object
      required:
        - requiredVersion
        - acceptedVersion
        - acceptedAt
        - accepted
      properties:
        requiredVersion:
          type: string
