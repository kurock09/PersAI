  /app/bootstrap:
    get:
      operationId: getAppBootstrap
      summary: Single-batch bootstrap for the web shell first paint (ADR-076 Slice 3).
      description: |
        Aggregates assistant lifecycle, web chat list, telegram integration,
        notification preference, user plan visibility, and admin plan visibility
        into one response. Each section reports `ok: true` with `data` or
        `ok: false` with a categorized error so non-critical sections never
        block the rest. The web RSC layout calls this once during SSR and seeds
        the client cache; per-endpoint clients are still used for refresh paths.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Bootstrap sections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAppBootstrapResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OnboardingRequest:
      type: object
      required:
        - displayName
        - workspaceName
        - locale
        - timezone
        - acceptTermsOfService
        - acceptPrivacyPolicy
      properties:
        displayName:
          type: string
        workspaceName:
          type: string
        locale:
          type: string
        timezone:
          type: string
        birthday:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          enum:
            - male
            - female
            - other
          nullable: true
        acceptTermsOfService:
          type: boolean
          enum: [true]
        acceptPrivacyPolicy:
          type: boolean
          enum: [true]
        termsOfServiceVersion:
          type: string
          maxLength: 64
          nullable: true
        privacyPolicyVersion:
          type: string
          maxLength: 64
          nullable: true
    WorkspaceSummary:
      type: object
      required:
        - id
        - name
        - locale
        - timezone
        - status
        - role
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        locale:
          type: string
        timezone:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
        role:
          type: string
          enum:
            - owner
            - member
    AppUserSummary:
      type: object
      required:
        - id
        - clerkUserId
        - email
      properties:
        id:
          type: string
          format: uuid
        clerkUserId:
          type: string
        email:
          type: string
        displayName:
          type: string
          nullable: true
        birthday:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          nullable: true
    OnboardingState:
      type: object
      required:
        - isComplete
        - status
      properties:
        isComplete:
          type: boolean
        status:
          type: string
          enum:
            - completed
            - pending
    ComplianceLegalAcceptanceState:
      type: object
      required:
        - requiredVersion
        - acceptedVersion
        - acceptedAt
        - accepted
      properties:
        requiredVersion:
          type: string
        acceptedVersion:
          type: string
          nullable: true
        acceptedAt:
          type: string
          format: date-time
          nullable: true
        accepted:
          type: boolean
    ComplianceRetentionDeleteBaselineState:
      type: object
      required:
        - retentionModel
        - chatRetention
        - memoryRegistryRetention
        - taskRegistryRetention
        - deleteModel
        - auditModel
      properties:
        retentionModel:
          type: string
          enum:
            - user_controlled_no_silent_ttl
        chatRetention:
          type: string
          enum:
            - retained_until_archive_or_hard_delete
        memoryRegistryRetention:
          type: string
          enum:
            - retained_until_forget_or_do_not_remember
        taskRegistryRetention:
          type: string
          enum:
            - retained_until_user_control_change
        deleteModel:
          type: string
          enum:
            - explicit_action_only
        auditModel:
          type: string
          enum:
            - append_only_immutable
    ComplianceState:
      type: object
      required:
        - termsOfService
        - privacyPolicy
        - retentionAndDeleteBaseline
      properties:
        termsOfService:
          $ref: "#/components/schemas/ComplianceLegalAcceptanceState"
        privacyPolicy:
          $ref: "#/components/schemas/ComplianceLegalAcceptanceState"
        retentionAndDeleteBaseline:
          $ref: "#/components/schemas/ComplianceRetentionDeleteBaselineState"
    CurrentMeState:
      type: object
      required:
        - appUser
        - onboarding
        - compliance
        - workspace
      properties:
        appUser:
          $ref: "#/components/schemas/AppUserSummary"
        onboarding:
          $ref: "#/components/schemas/OnboardingState"
        compliance:
          $ref: "#/components/schemas/ComplianceState"
        workspace:
          allOf:
            - $ref: "#/components/schemas/WorkspaceSummary"
          nullable: true
    GetMeResponse:
      type: object
      required:
        - me
      properties:
        requestId:
          type: string
          nullable: true
        me:
          $ref: "#/components/schemas/CurrentMeState"
    AssistantDraftState:
      type: object
      required:
        - displayName
        - instructions
        - voiceProfile
        - archetypeKey
        - updatedAt
      properties:
        displayName:
          type: string
          nullable: true
        instructions:
          type: string
          nullable: true
        traits:
          type: object
          additionalProperties:
            type: number
          nullable: true
        avatarEmoji:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
          description: |
            ADR-076 Slice 4 — content-addressed avatar URL of the form
            `/api/avatar/<hash>.<ext>`. The web BFF
            (`/api/avatar/[hash]`) serves the bytes with `Cache-Control:
            private, max-age=31536000, immutable`. Legacy absolute URLs
            persisted in dev databases are returned as `null` so the UI
            falls back to the emoji avatar until re-uploaded.
        assistantGender:
          allOf:
            - $ref: "#/components/schemas/AssistantIdentityGender"
          nullable: true
        voiceProfile:
          $ref: "#/components/schemas/AssistantVoiceProfileState"
        archetypeKey:
          type: string
          nullable: true
          description: ADR-074 V1 — selected Voice DNA archetype key.
        updatedAt:
          type: string
          format: date-time
          nullable: true
    AssistantVoiceProfileState:
      type: object
      required:
        - schema
        - defaultLocale
        - deliveryKind
        - elevenlabs
        - yandex
        - openai
      properties:
        schema:
          type: string
          enum:
            - persai.assistantVoiceProfile.v1
        defaultLocale:
