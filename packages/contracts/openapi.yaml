components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OnboardingRequest:
      type: object
      required:
        - displayName
        - workspaceName
        - locale
        - timezone
      properties:
        displayName:
          type: string
        workspaceName:
          type: string
        locale:
          type: string
        timezone:
          type: string
    WorkspaceSummary:
      type: object
      required:
        - id
        - name
        - locale
        - timezone
        - status
        - role
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        locale:
          type: string
        timezone:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
        role:
          type: string
          enum:
            - owner
            - member
    AppUserSummary:
      type: object
      required:
        - id
        - clerkUserId
        - email
      properties:
        id:
          type: string
          format: uuid
        clerkUserId:
          type: string
        email:
          type: string
        displayName:
          type: string
          nullable: true
    OnboardingState:
      type: object
      required:
        - isComplete
        - status
      properties:
        isComplete:
          type: boolean
        status:
          type: string
          enum:
            - completed
            - pending
    CurrentMeState:
      type: object
      required:
        - appUser
        - onboarding
        - workspace
      properties:
        appUser:
          $ref: "#/components/schemas/AppUserSummary"
        onboarding:
          $ref: "#/components/schemas/OnboardingState"
        workspace:
          allOf:
            - $ref: "#/components/schemas/WorkspaceSummary"
          nullable: true
    GetMeResponse:
      type: object
      required:
        - me
      properties:
        requestId:
          type: string
          nullable: true
        me:
          $ref: "#/components/schemas/CurrentMeState"
    AssistantDraftState:
      type: object
      required:
        - displayName
        - instructions
        - updatedAt
      properties:
        displayName:
          type: string
          nullable: true
        instructions:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    AssistantPublishedVersionSnapshotState:
      type: object
      required:
        - displayName
        - instructions
      properties:
        displayName:
          type: string
          nullable: true
        instructions:
          type: string
          nullable: true
    AssistantPublishedVersionState:
      type: object
      required:
        - id
        - version
        - publishedByUserId
        - publishedAt
        - snapshot
      properties:
        id:
          type: string
          format: uuid
        version:
          type: integer
          minimum: 1
        publishedByUserId:
          type: string
          format: uuid
        publishedAt:
          type: string
          format: date-time
        snapshot:
          $ref: "#/components/schemas/AssistantPublishedVersionSnapshotState"
    AssistantRuntimeApplyStatus:
      type: string
      enum:
        - not_requested
        - pending
        - in_progress
        - succeeded
        - failed
        - degraded
    AssistantRuntimeApplyErrorState:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
    AssistantRuntimeApplyState:
      type: object
      required:
        - status
        - targetPublishedVersionId
        - appliedPublishedVersionId
        - requestedAt
        - startedAt
        - finishedAt
        - error
      properties:
        status:
          $ref: "#/components/schemas/AssistantRuntimeApplyStatus"
        targetPublishedVersionId:
          type: string
          format: uuid
          nullable: true
        appliedPublishedVersionId:
          type: string
          format: uuid
          nullable: true
        requestedAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/AssistantRuntimeApplyErrorState"
          nullable: true
    AssistantGovernanceState:
      type: object
      required:
        - capabilityEnvelope
        - secretRefs
        - policyEnvelope
        - memoryControl
        - tasksControl
        - quotaPlanCode
        - quotaHook
        - auditHook
        - platformManagedUpdatedAt
      properties:
        capabilityEnvelope:
          type: object
          additionalProperties: true
          nullable: true
        secretRefs:
          type: object
          additionalProperties: true
          nullable: true
        policyEnvelope:
          type: object
          additionalProperties: true
          nullable: true
        memoryControl:
          description: >
            Step 6 D1 control-plane memory governance envelope (policy, provenance hooks,
            visibility hooks, forget-request markers, audit routing). Not raw OpenClaw/runtime memory.
          type: object
          additionalProperties: true
          nullable: true
        tasksControl:
          description: >
            Step 6 D4 control-plane tasks/reminders/triggers governance (ownership, source/surface hooks,
            control lifecycle labels, enable/disable/cancel flags, commercial quota exclusion for tasks,
            audit routing). OpenClaw owns execution and scheduling; PersAI does not run a backend scheduler here.
          type: object
          additionalProperties: true
          nullable: true
        quotaPlanCode:
          type: string
          nullable: true
        quotaHook:
          type: object
          additionalProperties: true
          nullable: true
        auditHook:
          type: object
          additionalProperties: true
          nullable: true
        platformManagedUpdatedAt:
          type: string
          format: date-time
          nullable: true
    AssistantMaterializationState:
      type: object
      required:
        - latestSpecId
        - publishedVersionId
        - sourceAction
        - algorithmVersion
        - contentHash
        - generatedAt
        - openclawBootstrapDocument
        - openclawWorkspaceDocument
      properties:
        latestSpecId:
          type: string
          format: uuid
          nullable: true
        publishedVersionId:
          type: string
          format: uuid
          nullable: true
        sourceAction:
          type: string
          enum:
            - publish
            - rollback
            - reset
          nullable: true
        algorithmVersion:
          type: integer
          nullable: true
        contentHash:
          type: string
          nullable: true
        generatedAt:
          type: string
          format: date-time
          nullable: true
        openclawBootstrapDocument:
          type: string
          nullable: true
        openclawWorkspaceDocument:
          type: string
          nullable: true
    AssistantMemoryRegistrySourceType:
      type: string
      enum:
        - web_chat
    AssistantTaskRegistrySourceSurface:
      type: string
      enum:
        - web
    AssistantTaskRegistryControlStatus:
      type: string
      enum:
        - active
        - disabled
        - cancelled
    AssistantTaskRegistryItemState:
      type: object
      required:
        - id
        - title
        - sourceSurface
        - sourceLabel
        - controlStatus
        - nextRunAt
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        sourceSurface:
          $ref: "#/components/schemas/AssistantTaskRegistrySourceSurface"
        sourceLabel:
          type: string
