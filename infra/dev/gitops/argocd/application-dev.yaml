apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: persai-dev
  namespace: argocd
spec:
  project: persai-dev
  source:
    repoURL: https://github.com/example/persai.git
    targetRevision: HEAD
    path: infra/helm
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: persai-dev
  syncPolicy:
    automated: null
