apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: persai-dev
  namespace: argocd
spec:
  description: PersAI dev project skeleton
  sourceRepos:
    - "*"
  destinations:
    - namespace: persai-dev
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
