{{- if .Values.runtime.enabled }}
{{- include "persai.adr152.assertAsyncJobRolloutContract" . }}
{{- $runtimeTag := default .Values.global.images.tag .Values.runtime.image.tag }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: runtime
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  revisionHistoryLimit: {{ default 2 .Values.runtime.revisionHistoryLimit }}
  minReadySeconds: {{ default 0 .Values.runtime.minReadySeconds }}
{{- with .Values.runtime.strategy }}
  strategy:
{{ toYaml . | indent 4 }}
{{- end }}
  replicas: {{ .Values.runtime.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: runtime
    spec:
{{- if .Values.runtime.serviceAccount.name }}
      serviceAccountName: {{ .Values.runtime.serviceAccount.name }}
{{- end }}
{{- if .Values.runtime.topologySpreadConstraints }}
      topologySpreadConstraints:
{{ include "persai.workloadTopologySpreadConstraints" (dict "constraints" .Values.runtime.topologySpreadConstraints "labels" (dict "app.kubernetes.io/name" "runtime")) | indent 8 }}
{{- end }}
      containers:
        - name: runtime
          image: "{{ .Values.global.images.registryHost }}/{{ .Values.global.images.projectId }}/{{ .Values.global.images.repository }}/{{ .Values.runtime.image.name }}:{{ $runtimeTag }}"
          imagePullPolicy: {{ .Values.runtime.image.pullPolicy }}
{{- if or .Values.runtime.env .Values.runtime.secretEnv }}
          env:
{{- range $name, $value := .Values.runtime.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
{{- range $name, $ref := .Values.runtime.secretEnv }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secretName | quote }}
                  key: {{ $ref.secretKey | quote }}
{{- if hasKey $ref "optional" }}
                  optional: {{ $ref.optional }}
{{- end }}
{{- end }}
{{- end }}
          ports:
            - containerPort: {{ .Values.runtime.service.port }}
{{- with .Values.runtime.resources }}
          resources:
{{ toYaml . | indent 12 }}
{{- end }}
{{- with .Values.runtime.probes.readiness }}
          readinessProbe:
            httpGet:
              path: {{ .path | quote }}
              port: {{ $.Values.runtime.service.port }}
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
{{- end }}
{{- with .Values.runtime.probes.liveness }}
          livenessProbe:
            httpGet:
              path: {{ .path | quote }}
              port: {{ $.Values.runtime.service.port }}
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
{{- end }}
{{- if .Values.runtime.cloudSqlProxy.enabled }}
        - name: cloud-sql-proxy
          image: "{{ .Values.runtime.cloudSqlProxy.image }}"
          imagePullPolicy: IfNotPresent
          args:
            - "--structured-logs"
            - "--port={{ .Values.runtime.cloudSqlProxy.port }}"
{{- if .Values.runtime.cloudSqlProxy.usePrivateIp }}
            - "--private-ip"
{{- end }}
            - "{{ .Values.runtime.cloudSqlProxy.instanceConnectionName }}"
{{- if .Values.runtime.cloudSqlProxy.port }}
          ports:
            - containerPort: {{ .Values.runtime.cloudSqlProxy.port }}
{{- end }}
{{- end }}
{{- end }}
