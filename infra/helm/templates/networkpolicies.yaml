{{- $apiPublicCidrs := .Values.networkPolicy.apiIngress.publicIpBlocks | default (list) }}
{{- $apiExtraCidrs := .Values.networkPolicy.apiIngress.extraFromIpBlocks | default (list) }}
{{- $apiIngressSafe := or (not .Values.ingress.enabled) (gt (len $apiPublicCidrs) 0) }}
{{- if and .Values.networkPolicy.enabled .Values.api.enabled $apiIngressSafe }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-ingress-baseline
  namespace: {{ .Values.global.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: web
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api-runtime-compatibility-gate
        {{- range $apiPublicCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
        {{- range $apiExtraCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.api.service.port }}
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: runtime
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: provider-gateway
      ports:
        - protocol: TCP
          port: {{ .Values.api.internalService.port }}
{{- end }}
---
{{- if and .Values.networkPolicy.enabled .Values.sandbox.enabled .Values.runtime.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-ingress-runtime-only
  namespace: {{ .Values.global.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sandbox
  policyTypes:
    - Ingress
  ingress:
    # ADR-126 v3 amendment (2026-06-25): the api now also calls the sandbox
    # control plane (POST /api/v1/jobs/shared-inbound-write) so a web upload
    # becomes visible to the running pod immediately, without waiting for the
    # next cold-start hydrate. Both runtime and api therefore need ingress to
    # the sandbox service port.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: runtime
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api
      ports:
        - protocol: TCP
          port: {{ .Values.sandbox.service.port }}
{{- end }}
---
{{- if and .Values.networkPolicy.enabled .Values.sandbox.enabled }}
{{- $proxyPort := .Values.sandbox.egressProxy.port | int }}
{{- $dnsCidrs := .Values.networkPolicy.sandboxDns.allowedCidrs | default (list) }}
{{- $dnsPorts := .Values.networkPolicy.sandboxDns.ports | default (list) }}
{{- if lt (len $dnsCidrs) 2 }}
{{- fail "networkPolicy.sandboxDns.allowedCidrs must contain the audited kube-dns and NodeLocal DNS /32s" }}
{{- end }}
{{- if ne (len $dnsPorts) 2 }}
{{- fail "networkPolicy.sandboxDns.ports must be exactly UDP/53 and TCP/53" }}
{{- end }}
{{- $dnsPortOne := index $dnsPorts 0 }}
{{- $dnsPortTwo := index $dnsPorts 1 }}
{{- if or (ne $dnsPortOne.protocol "UDP") (ne ($dnsPortOne.port | int) 53) (ne $dnsPortTwo.protocol "TCP") (ne ($dnsPortTwo.port | int) 53) }}
{{- fail "networkPolicy.sandboxDns.ports must be exactly UDP/53 followed by TCP/53" }}
{{- end }}
{{- /*
ADR-146: restricted default contour for every untrusted exec pod.
Selects app.kubernetes.io/component=sandbox-exec only (exact matchLabels) so
live unlabeled restricted pods keep the current contour until S3 stamps
persai.io/sandbox-egress. DNS peers are exact audited /32 ipBlocks — never a
kube-system namespaceSelector or broad DNS workload podSelector.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-exec-isolation
  namespace: {{ .Values.global.namespace }}
  labels:
    persai.io/sandbox-egress-policy: restricted
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: sandbox-exec
  policyTypes:
    - Ingress
    - Egress
  # Untrusted execution pods are outbound-only in every future egress mode.
  ingress: []
  egress:
    # DNS: exact audited kube-dns Service and NodeLocal DNSCache listener /32s.
    - to:
{{- range $dnsCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
{{- end }}
      ports:
{{- range $dnsPorts }}
        - protocol: {{ .protocol }}
          port: {{ .port }}
{{- end }}
{{- if .Values.sandbox.egressProxy.enabled }}
    # Egress proxy: allow only to the trusted Squid pod on the proxy port.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: sandbox-egress-proxy
      ports:
        - protocol: TCP
          port: {{ $proxyPort }}
{{- end }}
{{- end }}
---
{{- if and .Values.networkPolicy.enabled .Values.sandbox.enabled }}
{{- $dnsCidrs := .Values.networkPolicy.sandboxDns.allowedCidrs | default (list) }}
{{- $dnsPorts := .Values.networkPolicy.sandboxDns.ports | default (list) }}
{{- include "persai.sandboxEgress.assertPublicDeniedInventory" . }}
{{- $publicDenied := .Values.networkPolicy.sandboxEgress.publicDeniedCidrs | default (list) }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-nat-identity-probe-isolation
  namespace: {{ .Values.global.namespace }}
spec:
  podSelector:
    matchLabels:
      sandbox.gke.io/adr146-nat-probe: "true"
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to:
{{- range $dnsCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
{{- end }}
      ports:
{{- range $dnsPorts }}
        - protocol: {{ .protocol }}
          port: {{ .port }}
{{- end }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
{{- range $publicDenied }}
              - {{ . | quote }}
{{- end }}
      ports:
        - protocol: TCP
          port: 443
{{- end }}
---
{{- if and .Values.networkPolicy.enabled .Values.sandbox.enabled .Values.sandbox.egressProxy.enabled }}
{{- $proxyPort := .Values.sandbox.egressProxy.port | int }}
{{- $dnsCidrs := .Values.networkPolicy.sandboxDns.allowedCidrs | default (list) }}
{{- $dnsPorts := .Values.networkPolicy.sandboxDns.ports | default (list) }}
{{- include "persai.sandboxEgress.assertPublicDeniedInventory" . }}
{{- $publicDenied := .Values.networkPolicy.sandboxEgress.publicDeniedCidrs | default (list) }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-egress-proxy-isolation
  namespace: {{ .Values.global.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sandbox-egress-proxy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Accept connections only from exec pods.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: sandbox-exec
      ports:
        - protocol: TCP
          port: {{ $proxyPort }}
  egress:
    # DNS: exact audited kube-dns Service and NodeLocal DNSCache listener /32s.
    - to:
{{- range $dnsCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
{{- end }}
      ports:
{{- range $dnsPorts }}
        - protocol: {{ .protocol }}
          port: {{ .port }}
{{- end }}
    # Internet: the proxy is the L7 enforcement boundary; its own egress is allowed
    # on HTTP(S) ports to the allowlisted domains (enforced by Squid, not here).
    # Shared non-global/private/metadata deny inventory matches full-public exec.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
{{- range $publicDenied }}
              - {{ . | quote }}
{{- end }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
{{- end }}
---
{{- if and .Values.networkPolicy.enabled .Values.sandbox.enabled }}
{{- $dnsCidrs := .Values.networkPolicy.sandboxDns.allowedCidrs | default (list) }}
{{- $dnsPorts := .Values.networkPolicy.sandboxDns.ports | default (list) }}
{{- if lt (len $dnsCidrs) 2 }}
{{- fail "networkPolicy.sandboxDns.allowedCidrs must contain the audited kube-dns and NodeLocal DNS /32s" }}
{{- end }}
{{- if ne (len $dnsPorts) 2 }}
{{- fail "networkPolicy.sandboxDns.ports must be exactly UDP/53 and TCP/53" }}
{{- end }}
{{- include "persai.sandboxEgress.assertPublicDeniedInventory" . }}
{{- $publicDenied := .Values.networkPolicy.sandboxEgress.publicDeniedCidrs | default (list) }}
{{- $modeLabelKey := include "persai.sandboxExec.egressModeLabelKey" . }}
{{- $fullPublicLabel := include "persai.sandboxExec.fullPublicLabelValue" . }}
{{- /*
ADR-146 Slice 2 — additive full-public egress. Selects only exec pods that carry
persai.io/sandbox-egress=full-public. Never selects control-plane pods. Grants
no pod/namespace peers and no private/metadata destinations (shared deny
inventory). S3 stamps the label; until then this policy matches zero pods and
preserves the live restricted contour.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-exec-full-public-egress
  namespace: {{ .Values.global.namespace }}
  labels:
    persai.io/sandbox-egress-policy: full-public
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: sandbox-exec
      {{ $modeLabelKey }}: {{ $fullPublicLabel | quote }}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # DNS: same exact audited /32 ipBlocks as restricted (no namespaceSelector).
    - to:
{{- range $dnsCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
{{- end }}
      ports:
{{- range $dnsPorts }}
        - protocol: {{ .protocol }}
          port: {{ .port }}
{{- end }}
    # Direct public TCP/UDP only. except covers non-global, VPC, Pod, Service,
    # node, peer, link-local, and metadata ranges from the environment inventory.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
{{- range $publicDenied }}
              - {{ . | quote }}
{{- end }}
      ports:
        - protocol: TCP
        - protocol: UDP
{{- end }}
