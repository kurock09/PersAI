{{- if .Values.api.enabled }}
{{- include "persai.adr161.assertTextUsageRolloutFloors" . }}
{{- $apiTag := default .Values.global.images.tag .Values.api.image.tag }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: api
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  revisionHistoryLimit: {{ default 2 .Values.api.revisionHistoryLimit }}
  minReadySeconds: {{ default 0 .Values.api.minReadySeconds }}
{{- with .Values.api.strategy }}
  strategy:
{{ toYaml . | indent 4 }}
{{- end }}
{{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
{{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
    spec:
      serviceAccountName: {{ .Values.api.serviceAccount.name }}
{{- with .Values.api.scheduling.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.api.scheduling.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
{{- if .Values.api.topologySpreadConstraints }}
      topologySpreadConstraints:
{{ include "persai.workloadTopologySpreadConstraints" (dict "constraints" .Values.api.topologySpreadConstraints "labels" (dict "app.kubernetes.io/name" "api")) | indent 8 }}
{{- end }}
      containers:
        - name: api
          image: "{{ .Values.global.images.registryHost }}/{{ .Values.global.images.projectId }}/{{ .Values.global.images.repository }}/{{ .Values.api.image.name }}:{{ $apiTag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
{{- if or .Values.api.env .Values.api.secretEnv }}
          env:
{{- range $name, $value := .Values.api.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
            - name: PERSAI_RUNTIME_DISCOVERY_DNS
              value: {{ printf "runtime-headless.%s.svc.cluster.local" .Values.global.namespace | quote }}
            - name: PERSAI_RUNTIME_TARGET_REPLICAS
              value: {{ printf "%v" .Values.runtime.replicaCount | quote }}
            - name: PERSAI_RUNTIME_AUTOSCALING_ENABLED
              value: {{ ternary "true" "false" .Values.runtime.autoscaling.enabled | quote }}
            - name: PERSAI_RUNTIME_AUTOSCALING_MIN_REPLICAS
              value: {{ printf "%v" .Values.runtime.autoscaling.minReplicas | quote }}
            - name: PERSAI_RUNTIME_AUTOSCALING_MAX_REPLICAS
              value: {{ printf "%v" .Values.runtime.autoscaling.maxReplicas | quote }}
            - name: PERSAI_PROVIDER_GATEWAY_DISCOVERY_DNS
              value: {{ printf "provider-gateway-headless.%s.svc.cluster.local" .Values.global.namespace | quote }}
            - name: PERSAI_PROVIDER_GATEWAY_TARGET_REPLICAS
              value: {{ printf "%v" .Values.providerGateway.replicaCount | quote }}
            - name: PERSAI_PROVIDER_GATEWAY_AUTOSCALING_ENABLED
              value: {{ ternary "true" "false" .Values.providerGateway.autoscaling.enabled | quote }}
            - name: PERSAI_PROVIDER_GATEWAY_AUTOSCALING_MIN_REPLICAS
              value: {{ printf "%v" .Values.providerGateway.autoscaling.minReplicas | quote }}
            - name: PERSAI_PROVIDER_GATEWAY_AUTOSCALING_MAX_REPLICAS
              value: {{ printf "%v" .Values.providerGateway.autoscaling.maxReplicas | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
{{- range $name, $ref := .Values.api.secretEnv }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secretName | quote }}
                  key: {{ $ref.secretKey | quote }}
{{- if hasKey $ref "optional" }}
                  optional: {{ $ref.optional }}
{{- end }}
{{- end }}
{{- end }}
          ports:
            - containerPort: {{ .Values.api.service.port }}
            - containerPort: {{ .Values.api.internalService.port }}
{{- with .Values.api.resources }}
          resources:
{{ toYaml . | indent 12 }}
{{- end }}
{{- with .Values.api.probes.readiness }}
          readinessProbe:
            httpGet:
              path: {{ .path | quote }}
              port: {{ $.Values.api.service.port }}
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
{{- end }}
{{- with .Values.api.probes.liveness }}
          livenessProbe:
            httpGet:
              path: {{ .path | quote }}
              port: {{ $.Values.api.service.port }}
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
{{- end }}
{{- if .Values.api.cloudSqlProxy.enabled }}
        - name: cloud-sql-proxy
          image: "{{ .Values.api.cloudSqlProxy.image }}"
          imagePullPolicy: IfNotPresent
          args:
            - "--structured-logs"
            - "--port={{ .Values.api.cloudSqlProxy.port }}"
{{- if .Values.api.cloudSqlProxy.usePrivateIp }}
            - "--private-ip"
{{- end }}
            - "{{ .Values.api.cloudSqlProxy.instanceConnectionName }}"
{{- if .Values.api.cloudSqlProxy.port }}
          ports:
            - containerPort: {{ .Values.api.cloudSqlProxy.port }}
{{- end }}
{{- end }}
{{- end }}
