{{- if and .Values.api.enabled .Values.api.migrations.enabled }}
{{- $apiTag := default .Values.global.images.tag .Values.api.image.tag }}
apiVersion: batch/v1
kind: Job
metadata:
  name: api-migrate
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: api-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: {{ .Values.api.migrations.backoffLimit }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-migrate
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Values.api.serviceAccount.name }}
{{- if .Values.api.cloudSqlProxy.enabled }}
      initContainers:
        - name: cloud-sql-proxy
          image: "{{ .Values.api.cloudSqlProxy.image }}"
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          args:
            - "--structured-logs"
            - "--port={{ .Values.api.cloudSqlProxy.port }}"
{{- if .Values.api.cloudSqlProxy.usePrivateIp }}
            - "--private-ip"
{{- end }}
            - "{{ .Values.api.cloudSqlProxy.instanceConnectionName }}"
{{- if .Values.api.cloudSqlProxy.port }}
          ports:
            - containerPort: {{ .Values.api.cloudSqlProxy.port }}
{{- end }}
{{- end }}
      containers:
        - name: api-migrate
          image: "{{ .Values.global.images.registryHost }}/{{ .Values.global.images.projectId }}/{{ .Values.global.images.repository }}/{{ .Values.api.image.name }}:{{ $apiTag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - sh
            - -lc
            - |
              set -eu
{{- if .Values.api.cloudSqlProxy.enabled }}
              node -e '
              const net = require("net");
              const port = {{ .Values.api.cloudSqlProxy.port }};
              let attempt = 0;
              const maxAttempts = 30;
              const retryDelayMs = 1000;
              function waitForPort() {
                const socket = net.createConnection({ host: "127.0.0.1", port }, () => {
                  socket.end();
                  process.exit(0);
                });
                socket.on("error", () => {
                  socket.destroy();
                  attempt += 1;
                  if (attempt >= maxAttempts) {
                    console.error(`cloud-sql-proxy did not become ready on 127.0.0.1:${port}`);
                    process.exit(1);
                  }
                  setTimeout(waitForPort, retryDelayMs);
                });
              }
              waitForPort();
              '
{{- end }}
              corepack pnpm run prisma:migrate:deploy
              corepack pnpm run prisma:migrate:status
{{- if or .Values.api.env .Values.api.secretEnv }}
          env:
{{- range $name, $value := .Values.api.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
{{- range $name, $ref := .Values.api.secretEnv }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secretName | quote }}
                  key: {{ $ref.secretKey | quote }}
{{- if hasKey $ref "optional" }}
                  optional: {{ $ref.optional }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
