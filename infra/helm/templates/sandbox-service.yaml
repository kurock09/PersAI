{{- if .Values.sandbox.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: sandbox
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: sandbox
spec:
  type: {{ .Values.sandbox.service.type }}
  selector:
    app.kubernetes.io/name: sandbox
  ports:
    - name: http
      port: {{ .Values.sandbox.service.port }}
      targetPort: {{ .Values.sandbox.service.port }}
{{- end }}
