{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: web
spec:
  type: {{ .Values.web.service.type }}
  selector:
    app.kubernetes.io/name: web
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: {{ .Values.web.service.port }}
{{- end }}
