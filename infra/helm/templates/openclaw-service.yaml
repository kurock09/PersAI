{{- if .Values.openclaw.enabled }}
{{- range $poolKey, $pool := .Values.openclaw.runtimePools.pools }}
{{- if $pool.enabled }}
{{- $poolCtx := dict "Values" $.Values "poolKey" $poolKey "pool" $pool }}
{{- $openclaw := (include "persai.openclaw.poolMergedValues" (dict "Values" $.Values "pool" $pool) | fromYaml) }}
{{- include "persai.openclaw.assertSupportedRuntimePool" (dict "poolKey" $poolKey "openclaw" $openclaw) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "persai.openclaw.poolFullName" $poolCtx }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: runtime-pool
    persai.dev/runtime-pool: {{ $poolKey | quote }}
spec:
  type: {{ $openclaw.service.type }}
  selector:
    app.kubernetes.io/name: openclaw
    persai.dev/runtime-pool: {{ $poolKey | quote }}
  ports:
    - name: http
      port: {{ $openclaw.service.port }}
      targetPort: {{ $openclaw.service.port }}
---
{{- end }}
{{- end }}
{{- end }}
