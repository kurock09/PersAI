{{- if and .Values.sandbox.enabled .Values.sandbox.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.sandbox.serviceAccount.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: sandbox
{{- if .Values.sandbox.serviceAccount.gcpServiceAccountEmail }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.sandbox.serviceAccount.gcpServiceAccountEmail | quote }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-exec-pod-manager
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: sandbox
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-exec-pod-manager
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sandbox-exec-pod-manager
subjects:
  - kind: ServiceAccount
    name: {{ .Values.sandbox.serviceAccount.name }}
    namespace: {{ .Values.global.namespace }}
{{- end }}
