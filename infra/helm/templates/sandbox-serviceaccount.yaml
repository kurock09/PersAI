{{- if and .Values.sandbox.enabled .Values.sandbox.execServiceAccount.create }}
{{- if .Values.sandbox.execServiceAccount.gcpServiceAccountEmail }}
{{- fail "ADR-146: sandbox.execServiceAccount must not set gcpServiceAccountEmail (no Workload Identity / IAM on exec pods)" }}
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.sandbox.execServiceAccount.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: sandbox-exec
    app.kubernetes.io/component: sandbox-exec
    # Dedicated no-IAM / no-Workload-Identity exec identity (ADR-146 D4).
    persai.io/sandbox-exec-identity: "none"
# Intentionally identity-less: no GCP SA binding and no RBAC subject for this
# account. automount remains false for every exec pod.
automountServiceAccountToken: false
---
{{- end }}
{{- if and .Values.sandbox.enabled .Values.sandbox.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.sandbox.serviceAccount.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: sandbox
{{- if .Values.sandbox.serviceAccount.gcpServiceAccountEmail }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.sandbox.serviceAccount.gcpServiceAccountEmail | quote }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-exec-pod-manager
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: sandbox
rules:
  - apiGroups: [""]
    resources: ["pods"]
    # ADR-146 S3 model-job lease binding uses replaceNamespacedPod to stamp
    # persai.io/sandbox-job-id and persai.io/sandbox-lease-token annotations.
    verbs: ["get", "list", "create", "update", "delete"]
  # The @kubernetes/client-node Exec client opens the streaming connection over a
  # WebSocket upgrade, which the API server issues as an HTTP GET and authorizes as
  # verb "get" on pods/exec (the legacy SPDY path used POST -> "create"). Both verbs
  # are granted so exec works regardless of the streaming protocol negotiated.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-exec-pod-manager
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sandbox-exec-pod-manager
subjects:
  - kind: ServiceAccount
    name: {{ .Values.sandbox.serviceAccount.name }}
    namespace: {{ .Values.global.namespace }}
{{- end }}
