{{- if .Values.openclaw.enabled }}
{{- range $poolKey, $pool := .Values.openclaw.runtimePools.pools }}
{{- if $pool.enabled }}
{{- $poolCtx := dict "Values" $.Values "poolKey" $poolKey "pool" $pool }}
{{- $openclaw := (include "persai.openclaw.poolMergedValues" (dict "Values" $.Values "pool" $pool) | fromYaml) }}
{{- $openclawImage := include "persai.openclaw.imageRef" (dict "Values" $.Values "image" $openclaw.image) }}
{{- $sandboxBaseImage := include "persai.openclaw.imageRef" (dict "Values" $.Values "image" (dict "name" (default "openclaw-sandbox" (($openclaw.sandboxImages | default dict).base | default dict).name) "tag" (default $openclaw.image.tag (($openclaw.sandboxImages | default dict).base | default dict).tag) "digest" (default "" (($openclaw.sandboxImages | default dict).base | default dict).digest)) ) }}
{{- $sandboxCommonImage := include "persai.openclaw.sandboxCommonImageRef" (dict "Values" $.Values "openclaw" $openclaw) }}
{{- $gcsFuseEnabled := and (hasKey $openclaw "workspace") (hasKey $openclaw.workspace "gcsFuse") $openclaw.workspace.gcsFuse.enabled }}
{{- $sandboxRuntimeEnabled := and (hasKey $openclaw "sandboxRuntime") $openclaw.sandboxRuntime.enabled }}
{{- $sandboxPreloadEnabled := and $sandboxRuntimeEnabled $openclaw.sandboxRuntime.preloadSandboxImage }}
{{- $registryHost := $.Values.global.images.registryHost }}
{{- $runtimeCommand := concat (default (list) $openclaw.command) (default (list) $openclaw.args) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "persai.openclaw.poolFullName" $poolCtx }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: runtime-pool
    persai.dev/runtime-pool: {{ $poolKey | quote }}
spec:
  replicas: {{ $openclaw.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
      persai.dev/runtime-pool: {{ $poolKey | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
        app.kubernetes.io/component: runtime-pool
        persai.dev/runtime-pool: {{ $poolKey | quote }}
{{- if $gcsFuseEnabled }}
      annotations:
        gke-gcsfuse/volumes: "true"
{{- end }}
    spec:
{{- if $openclaw.serviceAccount.create }}
      serviceAccountName: {{ $openclaw.serviceAccount.name }}
{{- end }}
      volumes:
        - name: openclaw-config
          configMap:
            name: {{ include "persai.openclaw.poolConfigMapName" $poolCtx }}
        - name: tmp
          emptyDir:
            sizeLimit: 500Mi
{{- if $sandboxRuntimeEnabled }}
        - name: docker-run
          emptyDir: {}
        - name: agent-workspace
          emptyDir: {}
{{- end }}
{{- if $gcsFuseEnabled }}
        - name: workspace-gcs
          csi:
            driver: gcsfuse.csi.storage.gke.io
            readOnly: false
            volumeAttributes:
              bucketName: {{ $openclaw.workspace.gcsFuse.bucketName | quote }}
{{- if $openclaw.workspace.gcsFuse.mountOptions }}
              mountOptions: {{ $openclaw.workspace.gcsFuse.mountOptions | quote }}
{{- end }}
{{- end }}
      containers:
{{- if $sandboxRuntimeEnabled }}
        - name: docker-dind
          image: {{ $openclaw.sandboxRuntime.dind.image | quote }}
          imagePullPolicy: {{ $openclaw.sandboxRuntime.dind.pullPolicy }}
          env:
{{- range $name, $value := $openclaw.sandboxRuntime.dind.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
          securityContext:
            privileged: true
          volumeMounts:
            - name: docker-run
              mountPath: /var/run
            - name: agent-workspace
              mountPath: /home/node/.openclaw/workspace
{{- if $gcsFuseEnabled }}
            - name: workspace-gcs
              mountPath: {{ $openclaw.workspace.gcsFuse.mountPath | quote }}
{{- end }}
{{- with $openclaw.sandboxRuntime.dind.resources }}
          resources:
{{ toYaml . | indent 12 }}
{{- end }}
{{- end }}
        - name: openclaw
          image: "{{ $openclawImage }}"
          imagePullPolicy: {{ $openclaw.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
{{- with ($pool.config).resources }}
          resources:
{{ toYaml . | indent 12 }}
{{- end }}
{{- if and $sandboxPreloadEnabled (gt (len $runtimeCommand) 0) }}
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              if [ "${DOCKER_HOST:-}" = "" ]; then
                echo "DOCKER_HOST is required for sandbox image preload." >&2
                exit 1
              fi
              if [ "${OPENCLAW_DOCKER_SOCKET:-}" = "" ]; then
                echo "OPENCLAW_DOCKER_SOCKET is required for sandbox image preload." >&2
                exit 1
              fi
              attempts=0
              until [ -S "${OPENCLAW_DOCKER_SOCKET}" ]; do
                attempts=$((attempts + 1))
                if [ "${attempts}" -ge 180 ]; then
                  echo "Timed out waiting for Docker socket at ${OPENCLAW_DOCKER_SOCKET}." >&2
                  exit 1
                fi
                sleep 1
              done
              token="$(node -e "fetch('http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token',{headers:{'Metadata-Flavor':'Google'}}).then(async (res)=>{if(!res.ok){throw new Error('metadata token fetch failed: '+res.status)} const payload=await res.json(); process.stdout.write(payload.access_token || '');}).catch((error)=>{console.error(error); process.exit(1);});")"
              if [ -z "$token" ]; then
                echo "Metadata access token is empty." >&2
                exit 1
              fi
              printf '%s' "$token" | docker login -u oauth2accesstoken --password-stdin "https://${GAR_REGISTRY_HOST}"
              docker pull "${SANDBOX_BASE_IMAGE}"
              docker pull "${SANDBOX_COMMON_IMAGE}"
              exec {{ include "persai.openclaw.shellJoin" $runtimeCommand }}
{{- else if $openclaw.command }}
          command:
{{- range $openclaw.command }}
            - {{ . | quote }}
{{- end }}
{{- end }}
{{- if and (not $sandboxPreloadEnabled) $openclaw.args }}
          args:
{{- range $openclaw.args }}
            - {{ . | quote }}
{{- end }}
{{- end }}
{{- if or $openclaw.env $openclaw.secretEnv }}
          env:
{{- range $name, $value := $openclaw.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
{{- if $sandboxRuntimeEnabled }}
            - name: DOCKER_HOST
              value: {{ $openclaw.sandboxRuntime.dockerHost | quote }}
            - name: OPENCLAW_DOCKER_SOCKET
              value: {{ $openclaw.sandboxRuntime.dockerSocketPath | quote }}
            - name: DOCKER_CONFIG
              value: /tmp/.docker
{{- if $sandboxPreloadEnabled }}
            - name: SANDBOX_BASE_IMAGE
              value: {{ $sandboxBaseImage | quote }}
            - name: SANDBOX_COMMON_IMAGE
              value: {{ $sandboxCommonImage | quote }}
            - name: GAR_REGISTRY_HOST
              value: {{ $registryHost | quote }}
{{- end }}
{{- end }}
            - name: OPENCLAW_CONFIG_PATH
              value: {{ $openclaw.configPath | quote }}
            - name: PERSAI_RUNTIME_POOL_KEY
              value: {{ $poolKey | quote }}
{{- range $name, $ref := $openclaw.secretEnv }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secretName | quote }}
                  key: {{ $ref.secretKey | quote }}
{{- end }}
{{- end }}
          volumeMounts:
            - name: openclaw-config
              mountPath: {{ $openclaw.configPath | quote }}
              subPath: openclaw.json
            - name: tmp
              mountPath: /tmp
{{- if $sandboxRuntimeEnabled }}
            - name: docker-run
              mountPath: /var/run
            - name: agent-workspace
              mountPath: /home/node/.openclaw/workspace
{{- end }}
{{- if $gcsFuseEnabled }}
            - name: workspace-gcs
              mountPath: {{ $openclaw.workspace.gcsFuse.mountPath | quote }}
{{- end }}
          ports:
            - containerPort: {{ $openclaw.service.port }}
{{- if $sandboxPreloadEnabled }}
          startupProbe:
            httpGet:
              path: /readyz
              port: {{ $openclaw.service.port }}
            failureThreshold: {{ default 180 $openclaw.sandboxRuntime.startupProbe.failureThreshold }}
            periodSeconds: {{ default 5 $openclaw.sandboxRuntime.startupProbe.periodSeconds }}
{{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ $openclaw.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ $openclaw.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
---
{{- end }}
{{- end }}
{{- end }}
