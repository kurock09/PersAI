{{- if .Values.openclaw.enabled }}
{{- range $poolKey, $pool := .Values.openclaw.runtimePools.pools }}
{{- if $pool.enabled }}
{{- $poolCtx := dict "Values" $.Values "poolKey" $poolKey "pool" $pool }}
{{- $openclaw := (include "persai.openclaw.poolMergedValues" (dict "Values" $.Values "pool" $pool) | fromYaml) }}
{{- $openclawTag := default $.Values.global.images.tag $openclaw.image.tag }}
{{- $openclawDigest := default "" $openclaw.image.digest }}
{{- $openclawRepository := printf "%s/%s/%s/%s" $.Values.global.images.registryHost $.Values.global.images.projectId $.Values.global.images.repository $openclaw.image.name }}
{{- $openclawImage := printf "%s:%s" $openclawRepository $openclawTag }}
{{- if ne $openclawDigest "" }}
{{- $openclawImage = printf "%s@%s" $openclawRepository $openclawDigest }}
{{- end }}
{{- $gcsFuseEnabled := and (hasKey $openclaw "workspace") (hasKey $openclaw.workspace "gcsFuse") $openclaw.workspace.gcsFuse.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "persai.openclaw.poolFullName" $poolCtx }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: runtime-pool
    persai.dev/runtime-pool: {{ $poolKey | quote }}
spec:
  replicas: {{ $openclaw.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
      persai.dev/runtime-pool: {{ $poolKey | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
        app.kubernetes.io/component: runtime-pool
        persai.dev/runtime-pool: {{ $poolKey | quote }}
{{- if $gcsFuseEnabled }}
      annotations:
        gke-gcsfuse/volumes: "true"
{{- end }}
    spec:
{{- if $openclaw.serviceAccount.create }}
      serviceAccountName: {{ $openclaw.serviceAccount.name }}
{{- end }}
      volumes:
        - name: openclaw-config
          configMap:
            name: {{ include "persai.openclaw.poolConfigMapName" $poolCtx }}
{{- if $gcsFuseEnabled }}
        - name: workspace-gcs
          csi:
            driver: gcsfuse.csi.storage.gke.io
            readOnly: false
            volumeAttributes:
              bucketName: {{ $openclaw.workspace.gcsFuse.bucketName | quote }}
{{- if $openclaw.workspace.gcsFuse.mountOptions }}
              mountOptions: {{ $openclaw.workspace.gcsFuse.mountOptions | quote }}
{{- end }}
{{- end }}
      containers:
        - name: openclaw
          image: "{{ $openclawImage }}"
          imagePullPolicy: {{ $openclaw.image.pullPolicy }}
{{- if $openclaw.command }}
          command:
{{- range $openclaw.command }}
            - {{ . | quote }}
{{- end }}
{{- end }}
{{- if $openclaw.args }}
          args:
{{- range $openclaw.args }}
            - {{ . | quote }}
{{- end }}
{{- end }}
{{- if or $openclaw.env $openclaw.secretEnv }}
          env:
{{- range $name, $value := $openclaw.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
            - name: OPENCLAW_CONFIG_PATH
              value: {{ $openclaw.configPath | quote }}
            - name: PERSAI_RUNTIME_POOL_KEY
              value: {{ $poolKey | quote }}
{{- range $name, $ref := $openclaw.secretEnv }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secretName | quote }}
                  key: {{ $ref.secretKey | quote }}
{{- end }}
{{- end }}
          volumeMounts:
            - name: openclaw-config
              mountPath: {{ $openclaw.configPath | quote }}
              subPath: openclaw.json
{{- if $gcsFuseEnabled }}
            - name: workspace-gcs
              mountPath: {{ $openclaw.workspace.gcsFuse.mountPath | quote }}
{{- end }}
          ports:
            - containerPort: {{ $openclaw.service.port }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ $openclaw.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ $openclaw.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
---
{{- end }}
{{- end }}
{{- end }}
