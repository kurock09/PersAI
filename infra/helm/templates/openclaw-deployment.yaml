{{- if .Values.openclaw.enabled }}
{{- $openclawTag := default .Values.global.images.tag .Values.openclaw.image.tag }}
{{- $openclawDigest := default "" .Values.openclaw.image.digest }}
{{- $openclawRepository := printf "%s/%s/%s/%s" .Values.global.images.registryHost .Values.global.images.projectId .Values.global.images.repository .Values.openclaw.image.name }}
{{- $openclawImage := printf "%s:%s" $openclawRepository $openclawTag }}
{{- if ne $openclawDigest "" }}
{{- $openclawImage = printf "%s@%s" $openclawRepository $openclawDigest }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: openclaw
spec:
  replicas: {{ .Values.openclaw.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
    spec:
      volumes:
        - name: openclaw-config
          configMap:
            name: openclaw-config
      containers:
        - name: openclaw
          image: "{{ $openclawImage }}"
          imagePullPolicy: {{ .Values.openclaw.image.pullPolicy }}
{{- if .Values.openclaw.command }}
          command:
{{- range .Values.openclaw.command }}
            - {{ . | quote }}
{{- end }}
{{- end }}
{{- if .Values.openclaw.args }}
          args:
{{- range .Values.openclaw.args }}
            - {{ . | quote }}
{{- end }}
{{- end }}
{{- if or .Values.openclaw.env .Values.openclaw.secretEnv }}
          env:
{{- range $name, $value := .Values.openclaw.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
            - name: OPENCLAW_CONFIG_PATH
              value: {{ .Values.openclaw.configPath | quote }}
{{- range $name, $ref := .Values.openclaw.secretEnv }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secretName | quote }}
                  key: {{ $ref.secretKey | quote }}
{{- end }}
{{- end }}
          volumeMounts:
            - name: openclaw-config
              mountPath: {{ .Values.openclaw.configPath | quote }}
              subPath: openclaw.json
          ports:
            - containerPort: {{ .Values.openclaw.service.port }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.openclaw.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.openclaw.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
{{- end }}
