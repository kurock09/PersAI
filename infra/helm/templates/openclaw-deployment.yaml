{{- if .Values.openclaw.enabled }}
{{- $openclawTag := default .Values.global.images.tag .Values.openclaw.image.tag }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: openclaw
spec:
  replicas: {{ .Values.openclaw.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
    spec:
      containers:
        - name: openclaw
          image: "{{ .Values.global.images.registryHost }}/{{ .Values.global.images.projectId }}/{{ .Values.global.images.repository }}/{{ .Values.openclaw.image.name }}:{{ $openclawTag }}"
          imagePullPolicy: {{ .Values.openclaw.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.openclaw.service.port }}
{{- end }}
