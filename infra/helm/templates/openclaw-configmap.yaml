{{- if .Values.openclaw.enabled }}
{{- range $poolKey, $pool := .Values.openclaw.runtimePools.pools }}
{{- if $pool.enabled }}
{{- $poolCtx := dict "Values" $.Values "poolKey" $poolKey "pool" $pool }}
{{- $openclaw := (include "persai.openclaw.poolMergedValues" (dict "Values" $.Values "pool" $pool) | fromYaml) }}
{{- $sandboxImage := include "persai.openclaw.sandboxCommonImageRef" (dict "Values" $.Values "openclaw" $openclaw) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "persai.openclaw.poolConfigMapName" $poolCtx }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: runtime-pool
    persai.dev/runtime-pool: {{ $poolKey | quote }}
data:
  openclaw.json: |
    {
      "agents": {
        "defaults": {
          "model": {
            "primary": {{ $openclaw.agentDefaults.modelPrimary | toJson }}
          }{{- if $openclaw.agentDefaults.sandbox }},
          "sandbox": {{ mergeOverwrite (deepCopy $openclaw.agentDefaults.sandbox) (dict "docker" (mergeOverwrite (deepCopy ($openclaw.agentDefaults.sandbox.docker | default dict)) (dict "image" (default $sandboxImage $openclaw.agentDefaults.sandbox.docker.image)))) | toJson }}
          {{- end }}
        }
      },
      {{- if $openclaw.tools }}
      "tools": {{ $openclaw.tools | toJson }},
      {{- end }}
      "secrets": {
        "providers": {
          "persai-runtime": {
            "source": "persai",
            "baseUrl": {{ $openclaw.persaiSecretResolver.baseUrl | toJson }},
            "path": "/api/v1/internal/runtime/provider-secrets/resolve",
            "tokenEnvVar": "PERSAI_INTERNAL_API_TOKEN"
          }
        }
      },
      "cron": {
        "webhookToken": {
          "source": "env",
          "provider": "default",
          "id": "PERSAI_INTERNAL_API_TOKEN"
        }
      },
      "session": {
        "maintenance": {
          "mode": {{ $openclaw.sessionMaintenance.mode | toJson }},
          "pruneAfter": {{ $openclaw.sessionMaintenance.pruneAfter | toJson }},
          "maxEntries": {{ $openclaw.sessionMaintenance.maxEntries }},
          "rotateBytes": {{ $openclaw.sessionMaintenance.rotateBytes | toJson }},
          "resetArchiveRetention": {{ $openclaw.sessionMaintenance.resetArchiveRetention | toJson }},
          "maxDiskBytes": {{ $openclaw.sessionMaintenance.maxDiskBytes | toJson }},
          "highWaterBytes": {{ $openclaw.sessionMaintenance.highWaterBytes | toJson }}
        }
      },
      "messages": {
        "tts": {
          "auto": {{ $openclaw.tts.auto | toJson }},
          "mode": {{ $openclaw.tts.mode | toJson }}
        }
      },
      "gateway": {
        "controlUi": {
          "allowedOrigins": {{ $openclaw.controlUi.allowedOrigins | toJson }},
          "dangerouslyAllowHostHeaderOriginFallback": {{ $openclaw.controlUi.dangerouslyAllowHostHeaderOriginFallback | toJson }}
        }
      }
    }
---
{{- end }}
{{- end }}
{{- end }}
