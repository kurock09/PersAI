{{- if .Values.openclaw.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: openclaw
data:
  openclaw.json: |
    {
      "agents": {
        "defaults": {
          "model": {
            "primary": {{ .Values.openclaw.agentDefaults.modelPrimary | toJson }}
          }{{- if .Values.openclaw.agentDefaults.sandbox }},
          "sandbox": {{ .Values.openclaw.agentDefaults.sandbox | toJson }}
          {{- end }}
        }
      },
      {{- if .Values.openclaw.tools }}
      "tools": {{ .Values.openclaw.tools | toJson }},
      {{- end }}
      "secrets": {
        "providers": {
          "persai-runtime": {
            "source": "persai",
            "baseUrl": {{ .Values.openclaw.persaiSecretResolver.baseUrl | toJson }},
            "path": "/api/v1/internal/runtime/provider-secrets/resolve",
            "tokenEnvVar": "PERSAI_INTERNAL_API_TOKEN"
          }
        }
      },
      "cron": {
        "webhookToken": {
          "source": "env",
          "provider": "default",
          "id": "OPENCLAW_GATEWAY_TOKEN"
        }
      },
      "session": {
        "maintenance": {
          "mode": {{ .Values.openclaw.sessionMaintenance.mode | toJson }},
          "pruneAfter": {{ .Values.openclaw.sessionMaintenance.pruneAfter | toJson }},
          "maxEntries": {{ .Values.openclaw.sessionMaintenance.maxEntries }},
          "rotateBytes": {{ .Values.openclaw.sessionMaintenance.rotateBytes | toJson }},
          "resetArchiveRetention": {{ .Values.openclaw.sessionMaintenance.resetArchiveRetention | toJson }},
          "maxDiskBytes": {{ .Values.openclaw.sessionMaintenance.maxDiskBytes | toJson }},
          "highWaterBytes": {{ .Values.openclaw.sessionMaintenance.highWaterBytes | toJson }}
        }
      },
      "messages": {
        "tts": {
          "auto": {{ .Values.openclaw.tts.auto | toJson }},
          "mode": {{ .Values.openclaw.tts.mode | toJson }}
        }
      },
      "gateway": {
        "controlUi": {
          "allowedOrigins": {{ .Values.openclaw.controlUi.allowedOrigins | toJson }},
          "dangerouslyAllowHostHeaderOriginFallback": {{ .Values.openclaw.controlUi.dangerouslyAllowHostHeaderOriginFallback | toJson }}
        }
      }
    }
{{- end }}
