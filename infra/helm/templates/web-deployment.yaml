{{- if .Values.web.enabled }}
{{- $webTag := default .Values.global.images.tag .Values.web.image.tag }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: web
spec:
  revisionHistoryLimit: {{ default 2 .Values.web.revisionHistoryLimit }}
  minReadySeconds: {{ default 0 .Values.web.minReadySeconds }}
{{- with .Values.web.strategy }}
  strategy:
{{ toYaml . | indent 4 }}
{{- end }}
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
    spec:
{{- if .Values.web.topologySpreadConstraints }}
      topologySpreadConstraints:
{{ include "persai.workloadTopologySpreadConstraints" (dict "constraints" .Values.web.topologySpreadConstraints "labels" (dict "app.kubernetes.io/name" "web")) | indent 8 }}
{{- end }}
      containers:
        - name: web
          image: "{{ .Values.global.images.registryHost }}/{{ .Values.global.images.projectId }}/{{ .Values.global.images.repository }}/{{ .Values.web.image.name }}:{{ $webTag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
{{- if or .Values.web.env .Values.web.secretEnv }}
          env:
{{- range $name, $value := .Values.web.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
{{- range $name, $ref := .Values.web.secretEnv }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secretName | quote }}
                  key: {{ $ref.secretKey | quote }}
{{- if hasKey $ref "optional" }}
                  optional: {{ $ref.optional }}
{{- end }}
{{- end }}
{{- end }}
          ports:
            - containerPort: {{ .Values.web.service.port }}
{{- with .Values.web.resources }}
          resources:
{{ toYaml . | indent 12 }}
{{- end }}
{{- with .Values.web.probes.readiness }}
          readinessProbe:
            httpGet:
              path: {{ .path | quote }}
              port: {{ $.Values.web.service.port }}
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
{{- end }}
{{- with .Values.web.probes.liveness }}
          livenessProbe:
            httpGet:
              path: {{ .path | quote }}
              port: {{ $.Values.web.service.port }}
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
{{- end }}
{{- end }}
