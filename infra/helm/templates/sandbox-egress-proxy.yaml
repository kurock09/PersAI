{{- if and .Values.sandbox.enabled .Values.sandbox.egressProxy.enabled }}
{{- $proxyPort := .Values.sandbox.egressProxy.port | int }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: sandbox-egress-proxy-conf
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: sandbox-egress-proxy
    app.kubernetes.io/component: sandbox-egress-proxy
data:
  squid.conf: |
    # PersAI sandbox egress proxy — ADR-126 S2: expanded allowlist + tool attribution.
    # Exec pods route all HTTP(S) traffic here; Squid enforces the domain allowlist at L7
    # by SNI (CONNECT host) for HTTPS and Host header for plain HTTP. Only the domains
    # listed below are reachable. Everything else is denied. No SSL bumping — git push
    # is intentionally allowed in v1 (matches Claude Code's posture; ADR-126 v2 D3
    # follow-up 2026-06-23: founder confirmed push should be open).

    http_port {{ $proxyPort }}

    acl CONNECT method CONNECT

    # Domain allowlist — add entries only with justification.
    acl allowed_domains dstdomain{{- range .Values.sandbox.egressProxy.allowedDomains }} {{ . }}{{- end }}

    # Permit CONNECT (HTTPS) and plain HTTP only to allowed domains.
    http_access allow CONNECT allowed_domains
    http_access allow allowed_domains
    http_access deny all

    # No on-disk cache; the proxy is a policy boundary, not a caching layer.
    cache deny all

    # Structured egress log: tool=shell is static v1 attribution (exec-pod outbound is
    # exclusively shell-initiated through HTTP_PROXY env; richer per-tool attribution
    # for control-plane operations — image_generate, document, files.* — lives in
    # control-plane logs, not in this proxy log). Per ADR-126 v2 D12.
    logformat persai_egress %ts.%03tu %>a %Ss/%03>Hs %<st %rm %ru %ssl::>sni tool=shell
    access_log stdio:/dev/stdout persai_egress
    cache_log stdio:/dev/stderr
    pid_filename none
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-egress-proxy
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: sandbox-egress-proxy
    app.kubernetes.io/component: sandbox-egress-proxy
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sandbox-egress-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandbox-egress-proxy
        app.kubernetes.io/component: sandbox-egress-proxy
    spec:
      # Run squid directly as the image's unprivileged 'proxy' user (uid/gid 13 in
      # ubuntu/squid) instead of starting as root and dropping. This makes /dev/stdout
      # (owned by PID 1) writable by squid for access logging, avoids the root->proxy
      # privilege-drop entirely (so no SETUID/SETGID capabilities are needed), and keeps
      # the container non-root. fsGroup 13 makes the emptyDir volumes group-writable.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 13
        runAsGroup: 13
        fsGroup: 13
      containers:
        - name: squid
          image: {{ .Values.sandbox.egressProxy.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ $proxyPort }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: squid-conf
              mountPath: /etc/squid/squid.conf
              subPath: squid.conf
              readOnly: true
            - name: squid-cache
              mountPath: /var/spool/squid
            - name: squid-logs
              mountPath: /var/log/squid
            - name: squid-run
              mountPath: /run
{{- with .Values.sandbox.egressProxy.resources }}
          resources:
{{ toYaml . | indent 12 }}
{{- end }}
      volumes:
        - name: squid-conf
          configMap:
            name: sandbox-egress-proxy-conf
        - name: squid-cache
          emptyDir:
            sizeLimit: 128Mi
        - name: squid-logs
          emptyDir:
            sizeLimit: 64Mi
        - name: squid-run
          emptyDir:
            sizeLimit: 16Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-egress-proxy
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: sandbox-egress-proxy
    app.kubernetes.io/component: sandbox-egress-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sandbox-egress-proxy
  ports:
    - protocol: TCP
      port: {{ $proxyPort }}
      targetPort: {{ $proxyPort }}
{{- end }}
