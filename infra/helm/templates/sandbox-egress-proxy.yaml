{{- if and .Values.sandbox.enabled .Values.sandbox.egressProxy.enabled }}
{{- $proxyPort := .Values.sandbox.egressProxy.port | int }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: sandbox-egress-proxy-conf
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: sandbox-egress-proxy
    app.kubernetes.io/component: sandbox-egress-proxy
data:
  squid.conf: |
{{- include "persai.sandboxEgressProxy.squidConf" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-egress-proxy
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: sandbox-egress-proxy
    app.kubernetes.io/component: sandbox-egress-proxy
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sandbox-egress-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandbox-egress-proxy
        app.kubernetes.io/component: sandbox-egress-proxy
      annotations:
        # Hash the exact squid.conf helper body (not a manual revision counter) so
        # ConfigMap content changes roll the Pod. Required because subPath mounts
        # do not propagate ConfigMap updates into a running/CrashLooping container.
        checksum/squid-conf: {{ include "persai.sandboxEgressProxy.squidConf" . | sha256sum }}
    spec:
      # Run squid directly as the image's unprivileged 'proxy' user (uid/gid 13 in
      # ubuntu/squid) instead of starting as root and dropping. This makes /dev/stdout
      # (owned by PID 1) writable by squid for access logging, avoids the root->proxy
      # privilege-drop entirely (so no SETUID/SETGID capabilities are needed), and keeps
      # the container non-root. fsGroup 13 makes the emptyDir volumes group-writable.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 13
        runAsGroup: 13
        fsGroup: 13
      containers:
        - name: squid
          image: {{ .Values.sandbox.egressProxy.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ $proxyPort }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: squid-conf
              mountPath: /etc/squid/squid.conf
              subPath: squid.conf
              readOnly: true
            - name: squid-cache
              mountPath: /var/spool/squid
            - name: squid-logs
              mountPath: /var/log/squid
            - name: squid-run
              mountPath: /run
{{- with .Values.sandbox.egressProxy.resources }}
          resources:
{{ toYaml . | indent 12 }}
{{- end }}
      volumes:
        - name: squid-conf
          configMap:
            name: sandbox-egress-proxy-conf
        - name: squid-cache
          emptyDir:
            sizeLimit: 128Mi
        - name: squid-logs
          emptyDir:
            sizeLimit: 64Mi
        - name: squid-run
          emptyDir:
            sizeLimit: 16Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-egress-proxy
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: sandbox-egress-proxy
    app.kubernetes.io/component: sandbox-egress-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sandbox-egress-proxy
  ports:
    - protocol: TCP
      port: {{ $proxyPort }}
      targetPort: {{ $proxyPort }}
{{- end }}
