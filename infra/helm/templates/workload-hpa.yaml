{{- if and .Values.runtime.enabled .Values.runtime.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: runtime
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: runtime
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: runtime
  minReplicas: {{ .Values.runtime.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.runtime.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.runtime.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.runtime.autoscaling.targetMemoryUtilizationPercentage }}
---
{{- end }}
{{- if .Values.openclaw.enabled }}
{{- range $poolKey, $pool := .Values.openclaw.runtimePools.pools }}
{{- if $pool.enabled }}
{{- $poolCtx := dict "Values" $.Values "poolKey" $poolKey "pool" $pool }}
{{- $openclaw := (include "persai.openclaw.poolMergedValues" (dict "Values" $.Values "pool" $pool) | fromYaml) }}
{{- include "persai.openclaw.assertSupportedRuntimePool" (dict "poolKey" $poolKey "openclaw" $openclaw) }}
{{- if $openclaw.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "persai.openclaw.poolFullName" $poolCtx }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: runtime-pool
    persai.dev/runtime-pool: {{ $poolKey | quote }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "persai.openclaw.poolFullName" $poolCtx }}
  minReplicas: {{ $openclaw.autoscaling.minReplicas }}
  maxReplicas: {{ $openclaw.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $openclaw.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $openclaw.autoscaling.targetMemoryUtilizationPercentage }}
---
{{- end }}
{{- end }}
{{- end }}
{{- end }}
