{{- if .Values.ingress.enabled }}
{{- $freePoolKey := "free_shared_restricted" }}
{{- $freeIngressPoolKey := "free_shared_restricted_sandbox" }}
{{- $freeIngressPool := (index .Values.openclaw.runtimePools.pools $freeIngressPoolKey) | default (index .Values.openclaw.runtimePools.pools $freePoolKey) }}
{{- $freeIngressPoolEnabled := and .Values.openclaw.enabled $freeIngressPool.enabled }}
{{- $freePoolCtx := dict "Values" .Values "poolKey" (ternary $freeIngressPoolKey $freePoolKey (hasKey .Values.openclaw.runtimePools.pools $freeIngressPoolKey)) "pool" $freeIngressPool }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: persai-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/part-of: persai
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: {{ .Values.ingress.staticIpName }}
    networking.gke.io/managed-certificates: {{ range $i, $c := .Values.ingress.certificates }}{{ if $i }},{{ end }}{{ $c.name }}{{ end }}
spec:
  rules:
    {{- if .Values.web.enabled }}
    - host: {{ .Values.ingress.hosts.web }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: {{ .Values.web.service.port }}
    {{- end }}
    {{- if .Values.api.enabled }}
    - host: {{ .Values.ingress.hosts.api }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: {{ .Values.api.service.port }}
    {{- end }}
    {{- if and $freeIngressPoolEnabled .Values.openclaw.telegramWebhook.enabled }}
    - host: {{ .Values.ingress.hosts.bot }}
      http:
        paths:
          - path: /telegram-webhook
            pathType: Prefix
            backend:
              service:
                name: {{ include "persai.openclaw.poolFullName" $freePoolCtx }}
                port:
                  number: {{ .Values.openclaw.service.port }}
    {{- end }}
{{- end }}
