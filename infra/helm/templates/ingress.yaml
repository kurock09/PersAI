{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: persai-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/part-of: persai
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: {{ .Values.ingress.staticIpName }}
    networking.gke.io/managed-certificates: {{ range $i, $c := .Values.ingress.certificates }}{{ if $i }},{{ end }}{{ $c.name }}{{ end }}
spec:
  rules:
    {{- if .Values.web.enabled }}
    - host: {{ .Values.ingress.hosts.web }}
      http:
        paths:
          {{- if .Values.api.enabled }}
          # ADR-114: live voice relay is a raw WebSocket upgrade. The Next.js web
          # server proxies plain HTTP /api/v1 calls to the API but does NOT proxy
          # WS upgrades, so this single path is routed straight to the API backend
          # (GCLB supports WS natively; api backend timeout is already 3600s).
          - path: /api/v1/assistant/live-voice/relay
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: {{ .Values.api.service.port }}
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: {{ .Values.web.service.port }}
    {{- end }}
    {{- if .Values.api.enabled }}
    - host: {{ .Values.ingress.hosts.api }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: {{ .Values.api.service.port }}
    {{- end }}
    {{- if and .Values.api.enabled .Values.api.telegramWebhook.enabled }}
    - host: {{ .Values.ingress.hosts.bot }}
      http:
        paths:
          - path: /telegram-webhook
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: {{ .Values.api.service.port }}
    {{- end }}
{{- end }}
