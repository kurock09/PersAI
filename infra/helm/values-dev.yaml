global:
  namespace: persai-dev
  images:
    registryHost: europe-west1-docker.pkg.dev
    projectId: project-44786b14-b7d7-4554-a8a
    repository: persai
    tag: fd54dc7ff98c97c95c974fdde604d6085d943064

networkPolicy:
  enabled: true
  apiIngress:
    # Recommended starter block for GKE-backed prod-like rollout:
    # 1. Replace these commented examples with the real pod-visible/public ingress proxy CIDRs
    #    that represent api.persai.dev in the CURRENT GKE path.
    # 2. For classic GCLB/GFE-backed paths, start validation from official Google LB docs.
    # 3. Keep this list empty until you have verified the real ranges; the API policy stays gated.
    #
    # Example starter values to verify before uncommenting:
    # publicIpBlocks:
    #   - 35.191.0.0/16
    #   - 130.211.0.0/22
    # Public API ingress CIDRs (for GCLB or other trusted ingress hops). When empty
    # and ingress is enabled, the API NetworkPolicy will not be rendered.
    publicIpBlocks:
      - 35.191.0.0/16
      - 130.211.0.0/22
    # Additional internal callers allowed to the public API port.
    extraFromIpBlocks: []

api:
  enabled: true
  replicaCount: 2
  revisionHistoryLimit: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  serviceAccount:
    create: true
    name: api-sa
    gcpServiceAccountEmail: api-runtime@project-44786b14-b7d7-4554-a8a.iam.gserviceaccount.com
  image:
    name: api
    tag: ""
    pullPolicy: IfNotPresent
  cloudSqlProxy:
    enabled: true
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.18.3
    port: 5432
    instanceConnectionName: project-44786b14-b7d7-4554-a8a:europe-west1:persai-dev-postgres
    usePrivateIp: true
  env:
    APP_ENV: dev
    PORT: "3001"
    API_INTERNAL_PORT: "3002"
    LOG_LEVEL: info
    GCP_PROJECT_ID: project-44786b14-b7d7-4554-a8a
    GCP_REGION: europe-west1
    PERSAI_WEB_CHAT_SYNC_RUNTIME_MODE: "native"
    PERSAI_WEB_CHAT_STREAM_RUNTIME_MODE: "native"
    PERSAI_RUNTIME_BASE_URL: "http://runtime:3012"
    PERSAI_RUNTIME_BUNDLE_SYNC_TIMEOUT_MS: "10000"
    PERSAI_RUNTIME_TURN_TIMEOUT_MS: "90000"
    PERSAI_PROVIDER_GATEWAY_BASE_URL: "http://provider-gateway:3011"
    PERSAI_PROVIDER_GATEWAY_WARMUP_TIMEOUT_MS: "10000"
    PERSAI_MEDIA_BUCKET_NAME: "persai-dev-workspaces"
    PERSAI_MEDIA_OBJECT_PREFIX: "assistant-media"
    TELEGRAM_WEBHOOK_BASE_URL: "https://bot.persai.dev"
    ABUSE_PEER_SLOWDOWN_REQUESTS_PER_MINUTE: "12"
    ABUSE_PEER_BLOCK_REQUESTS_PER_MINUTE: "30"
    ABUSE_SLOWDOWN_SECONDS: "5"
    WEB_ACTIVE_CHATS_CAP: "20"
    QUOTA_TOKEN_BUDGET_DEFAULT: "200000"
    QUOTA_COST_OR_TOKEN_DRIVING_TOOL_UNITS_DEFAULT: "1000"
    # Only these PersAI AppUser emails may use /api/v1/admin/* (must still pass role checks, e.g. workspace owner).
    PERSAI_ADMIN_ALLOWLIST_EMAILS: "kurock09@gmail.com"
  secretEnv:
    DATABASE_URL:
      secretName: persai-api-secrets
      secretKey: DATABASE_URL
    CLERK_SECRET_KEY:
      secretName: persai-api-secrets
      secretKey: CLERK_SECRET_KEY
    ADMIN_STEP_UP_HMAC_SECRET:
      secretName: persai-api-secrets
      secretKey: ADMIN_STEP_UP_HMAC_SECRET
      optional: true
    RUNTIME_PROVIDER_SECRETS_MASTER_KEY:
      secretName: persai-api-secrets
      secretKey: RUNTIME_PROVIDER_SECRETS_MASTER_KEY
      optional: true
    TELEGRAM_WEBHOOK_HMAC_SECRET:
      secretName: persai-api-secrets
      secretKey: TELEGRAM_WEBHOOK_HMAC_SECRET
      optional: true
    PERSAI_INTERNAL_API_TOKEN:
      secretName: persai-runtime-secrets
      secretKey: PERSAI_INTERNAL_API_TOKEN
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 1536Mi
  autoscaling:
    # Keep HPA explicit but disabled until SR3 owns request-path and dependency
    # scaling behavior under real target-environment evidence.
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
  service:
    type: ClusterIP
    port: 3001
  internalService:
    enabled: true
    port: 3002
  telegramWebhook:
    enabled: true

web:
  enabled: true
  replicaCount: 2
  revisionHistoryLimit: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  image:
    name: web
    tag: ""
    pullPolicy: IfNotPresent
  env:
    NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_live_Y2xlcmsucGVyc2FpLmRldiQ
    NEXT_PUBLIC_CLERK_PROXY_URL: "https://persai.dev/clerk-proxy"
    NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
    NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
    PERSAI_WEB_API_PROXY_TARGET: "http://api:3001"
  secretEnv:
    CLERK_SECRET_KEY:
      secretName: persai-api-secrets
      secretKey: CLERK_SECRET_KEY
  probes:
    readiness:
      path: /api/ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /api/health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    # Keep HPA explicit but disabled until SR2 gets target-environment evidence for
    # request-driven scaling and safe interaction with long-lived web traffic.
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
  service:
    type: ClusterIP
    port: 3000
  # Long SSE streams (e.g. image generation ~30s+) exceed GCLB default ~30s idle timeout without this.
  backendConfig:
    enabled: true
    name: persai-web-backend-config
    timeoutSec: 3600

providerGateway:
  enabled: true
  replicaCount: 2
  revisionHistoryLimit: 2
  minReadySeconds: 5
  strategy:
