      - 10.198.0.0/20
      - 10.200.0.0/20
      - 10.202.0.0/20
      - 10.204.0.0/20
      - 10.206.0.0/20
      - 10.208.0.0/20
      - 10.210.0.0/20
      - 10.212.0.0/20
      - 10.214.0.0/20
      - 10.218.0.0/20
      - 10.224.0.0/20
      - 10.226.0.0/20
      - 10.232.0.0/20
      - 10.5.48.0/20
      - 10.11.128.0/20
      - 10.11.128.0/24
      - 10.107.45.64/29
      - 10.105.140.56/29
    publicDeniedCidrs: *sandboxRequiredDeniedCidrs
  apiIngress:
    # Recommended starter block for GKE-backed prod-like rollout:
    # 1. Replace these commented examples with the real pod-visible/public ingress proxy CIDRs
    #    that represent api.persai.dev in the CURRENT GKE path.
    # 2. For classic GCLB/GFE-backed paths, start validation from official Google LB docs.
    # 3. Keep this list empty until you have verified the real ranges; the API policy stays gated.
    #
    # Example starter values to verify before uncommenting:
    # publicIpBlocks:
    #   - 35.191.0.0/16
    #   - 130.211.0.0/22
    # Public API ingress CIDRs (for GCLB or other trusted ingress hops). When empty
    # and ingress is enabled, the API NetworkPolicy will not be rendered.
    publicIpBlocks:
      - 35.191.0.0/16
      - 130.211.0.0/22
    # Additional internal callers allowed to the public API port.
    extraFromIpBlocks: []

api:
  enabled: true
  replicaCount: 2
  revisionHistoryLimit: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  serviceAccount:
    create: true
    name: api-sa
    gcpServiceAccountEmail: api-runtime@project-44786b14-b7d7-4554-a8a.iam.gserviceaccount.com
  image:
    name: api
    tag: ce5d7f06b9db1391b52082cbff58c4791f17046b
    pullPolicy: IfNotPresent
  cloudSqlProxy:
    enabled: true
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.18.3
    port: 5432
    instanceConnectionName: project-44786b14-b7d7-4554-a8a:europe-west1:persai-dev-postgres
    usePrivateIp: true
  env:
    APP_ENV: dev
    PORT: "3001"
    API_INTERNAL_PORT: "3002"
    LOG_LEVEL: info
    # ADR-091 audit: dev api limit is 2 vCPU => max(10, 2 × 4) = 10.
    PRISMA_CONNECTION_LIMIT: "10"
    GCP_PROJECT_ID: project-44786b14-b7d7-4554-a8a
    GCP_REGION: europe-west1
    PERSAI_WEB_CHAT_SYNC_RUNTIME_MODE: "native"
    PERSAI_WEB_CHAT_STREAM_RUNTIME_MODE: "native"
    PERSAI_RUNTIME_BASE_URL: "http://runtime:3012"
    PERSAI_RUNTIME_BUNDLE_SYNC_TIMEOUT_MS: "10000"
    PERSAI_RUNTIME_TURN_TIMEOUT_MS: "300000"
    # ADR-149: whole-turn wall-clock ceiling (default 30 min) and progress-only idle stall (default 5 min).
    PERSAI_RUNTIME_TURN_WALL_CLOCK_MS: "1800000"
    PERSAI_RUNTIME_TURN_IDLE_STALL_MS: "300000"
    ORPHAN_ATTEMPT_GRACE_MS: "1200000"
    PERSAI_PROVIDER_GATEWAY_BASE_URL: "http://provider-gateway:3011"
    PERSAI_PROVIDER_GATEWAY_WARMUP_TIMEOUT_MS: "10000"
    PERSAI_WEB_BASE_URL: "https://persai.dev"
    PERSAI_MEDIA_BUCKET_NAME: "persai-dev-workspaces"
    PERSAI_MEDIA_OBJECT_PREFIX: "fs"
    # ADR-126 v3 amendment (2026-06-25): api calls the sandbox control plane
    # (POST /api/v1/jobs/shared-inbound-write) so a web upload becomes visible
    # to the running pod immediately instead of only after the next cold-start
    # hydrate. Same host:port as runtime uses.
    PERSAI_SANDBOX_BASE_URL: "http://sandbox:3013"
    PERSAI_SANDBOX_TIMEOUT_MS: "20000"
    PERSAI_SANDBOX_EGRESS_RECYCLE_TIMEOUT_MS: "300000"
    TELEGRAM_WEBHOOK_BASE_URL: "https://bot.persai.dev"
    ABUSE_PEER_SLOWDOWN_REQUESTS_PER_MINUTE: "12"
    ABUSE_PEER_BLOCK_REQUESTS_PER_MINUTE: "30"
    ABUSE_SLOWDOWN_SECONDS: "5"
    WEB_ACTIVE_CHATS_CAP: "20"
    QUOTA_TOKEN_BUDGET_DEFAULT: "200000"
    QUOTA_COST_OR_TOKEN_DRIVING_TOOL_UNITS_DEFAULT: "1000"
    # Only these PersAI AppUser emails may use /api/v1/admin/* (must still pass role checks, e.g. workspace owner).
    PERSAI_ADMIN_ALLOWLIST_EMAILS: "kurock09@gmail.com"
    PERSAI_OPERATOR_ACTOR_EMAIL: "kurock09@gmail.com"
  secretEnv:
    DATABASE_URL:
      secretName: persai-api-secrets
      secretKey: DATABASE_URL
    CLERK_SECRET_KEY:
      secretName: persai-api-secrets
      secretKey: CLERK_SECRET_KEY
    ADMIN_STEP_UP_HMAC_SECRET:
      secretName: persai-api-secrets
      secretKey: ADMIN_STEP_UP_HMAC_SECRET
      optional: true
    RUNTIME_PROVIDER_SECRETS_MASTER_KEY:
      secretName: persai-api-secrets
      secretKey: RUNTIME_PROVIDER_SECRETS_MASTER_KEY
      optional: true
    TELEGRAM_WEBHOOK_HMAC_SECRET:
      secretName: persai-api-secrets
      secretKey: TELEGRAM_WEBHOOK_HMAC_SECRET
      optional: true
    PERSAI_INTERNAL_API_TOKEN:
      secretName: persai-runtime-secrets
      secretKey: PERSAI_INTERNAL_API_TOKEN
    PERSAI_OPERATOR_TOKEN:
      secretName: persai-api-secrets
      secretKey: PERSAI_OPERATOR_TOKEN
      optional: true
    # ADR-140 cross-pod browser-bridge relay. Reuses the runtime Redis so a device
    # WebSocket held by one api replica is reachable from dispatch/result HTTP served by
    # any other replica (api runs >=2 replicas). Optional so api still boots without it.
    BROWSER_BRIDGE_REDIS_URL:
      secretName: persai-runtime-secrets
      secretKey: PERSAI_RUNTIME_SPEC_STORE_REDIS_URL
      optional: true
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  resources:
    requests:
      cpu: "1"
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 1536Mi
  scheduling:
    # Keep API stream orchestration isolated from runtime/provider/web so autoscaling can
    # react to the real hot path without competing for the mixed default pool.
    nodeSelector:
      workload: api
    tolerations:
      - key: dedicated
        operator: Equal
        value: api
        effect: NoSchedule
  autoscaling:
    # Stream-only load evidence shows API saturates before runtime/provider-gateway.
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 0
        selectPolicy: Max
        policies:
          - type: Percent
            value: 100
            periodSeconds: 60
          - type: Pods
            value: 4
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 60
        selectPolicy: Max
        policies:
          - type: Percent
            value: 50
            periodSeconds: 60
          - type: Pods
            value: 2
            periodSeconds: 60
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
  service:
    type: ClusterIP
    port: 3001
  # Telegram webhooks share the `api` GCLB backend and need the same long
  # timeout protection as slow web/native turns.
  backendConfig:
    enabled: true
    name: persai-api-backend-config
    timeoutSec: 3600
  internalService:
    enabled: true
    port: 3002
  telegramWebhook:
    enabled: true

