global:
  namespace: persai-dev
  images:
    registryHost: europe-west1-docker.pkg.dev
    projectId: project-44786b14-b7d7-4554-a8a
    repository: persai
    tag: f32abfc8f01c32a1ab4879382bd15f9336720f04

networkPolicy:
  enabled: true
  apiIngress:
    # Recommended starter block for GKE-backed prod-like rollout:
    # 1. Replace these commented examples with the real pod-visible/public ingress proxy CIDRs
    #    that represent api.persai.dev in the CURRENT GKE path.
    # 2. For classic GCLB/GFE-backed paths, start validation from official Google LB docs.
    # 3. Keep this list empty until you have verified the real ranges; the API policy stays gated.
    #
    # Example starter values to verify before uncommenting:
    # publicIpBlocks:
    #   - 35.191.0.0/16
    #   - 130.211.0.0/22
    # Public API ingress CIDRs (for GCLB or other trusted ingress hops). When empty
    # and ingress is enabled, the API NetworkPolicy will not be rendered.
    publicIpBlocks:
      - 35.191.0.0/16
      - 130.211.0.0/22
    # Additional internal callers allowed to the public API port.
    extraFromIpBlocks: []
  openclawIngress:
    # Recommended starter block for GKE-backed Telegram webhook rollout:
    # 1. Put pod-visible trusted ingress/proxy CIDRs here FIRST.
    # 2. In many GKE Ingress-backed paths this starts from Google LB/GFE/backend
    #    health/proxy ranges, not from Telegram sender IPs alone.
    # 3. Keep this list empty until you have verified the real pod-visible ranges;
    #    the OpenClaw ingress policy stays gated while empty.
    #
    # Example starter values to verify before uncommenting:
    # trustedIngressIpBlocks:
    #   - 35.191.0.0/16
    #   - 130.211.0.0/22
    trustedIngressIpBlocks:
      - 35.191.0.0/16
      - 130.211.0.0/22
    # Optional supplemental Telegram sender CIDRs only if they are ACTUALLY pod-visible
    # in your deployed ingress path. Do not treat this list as the primary GKE allowlist.
    #
    # Current official Telegram webhook guide references:
    # telegramWebhookIpBlocks:
    #   - 149.154.160.0/20
    #   - 91.108.4.0/22
    telegramWebhookIpBlocks: []

api:
  enabled: true
  replicaCount: 2
  revisionHistoryLimit: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  serviceAccount:
    create: true
    name: api-sa
    gcpServiceAccountEmail: api-runtime@project-44786b14-b7d7-4554-a8a.iam.gserviceaccount.com
  image:
    name: api
    tag: ""
    pullPolicy: IfNotPresent
  cloudSqlProxy:
    enabled: true
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.18.3
    port: 5432
    instanceConnectionName: project-44786b14-b7d7-4554-a8a:europe-west1:persai-dev-postgres
    usePrivateIp: true
  env:
    APP_ENV: dev
    PORT: "3001"
    API_INTERNAL_PORT: "3002"
    LOG_LEVEL: info
    GCP_PROJECT_ID: project-44786b14-b7d7-4554-a8a
    GCP_REGION: europe-west1
    OPENCLAW_ADAPTER_ENABLED: "true"
    OPENCLAW_BASE_URL_FREE_SHARED_RESTRICTED: "http://openclaw-free-shared-restricted-sandbox:18789"
    OPENCLAW_BASE_URL_PAID_SHARED_RESTRICTED: "http://openclaw-paid-shared-restricted-sandbox:18789"
    OPENCLAW_BASE_URL_PAID_ISOLATED: "http://openclaw-paid-isolated:18789"
    OPENCLAW_ADAPTER_TIMEOUT_MS: "90000"
    TELEGRAM_WEBHOOK_BASE_URL: "https://bot.persai.dev"
    WEB_ACTIVE_CHATS_CAP: "20"
    QUOTA_TOKEN_BUDGET_DEFAULT: "200000"
    QUOTA_COST_OR_TOKEN_DRIVING_TOOL_UNITS_DEFAULT: "1000"
    # Only these PersAI AppUser emails may use /api/v1/admin/* (must still pass role checks, e.g. workspace owner).
    PERSAI_ADMIN_ALLOWLIST_EMAILS: "kurock09@gmail.com"
  secretEnv:
    DATABASE_URL:
      secretName: persai-api-secrets
      secretKey: DATABASE_URL
    CLERK_SECRET_KEY:
      secretName: persai-api-secrets
      secretKey: CLERK_SECRET_KEY
    ADMIN_STEP_UP_HMAC_SECRET:
      secretName: persai-api-secrets
      secretKey: ADMIN_STEP_UP_HMAC_SECRET
      optional: true
    RUNTIME_PROVIDER_SECRETS_MASTER_KEY:
      secretName: persai-api-secrets
      secretKey: RUNTIME_PROVIDER_SECRETS_MASTER_KEY
      optional: true
    TELEGRAM_WEBHOOK_HMAC_SECRET:
      secretName: persai-api-secrets
      secretKey: TELEGRAM_WEBHOOK_HMAC_SECRET
      optional: true
    OPENCLAW_GATEWAY_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: OPENCLAW_GATEWAY_TOKEN
    PERSAI_INTERNAL_API_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: PERSAI_INTERNAL_API_TOKEN
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 1536Mi
  autoscaling:
    # Keep HPA explicit but disabled until SR3 owns request-path and dependency
    # scaling behavior under real target-environment evidence.
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
  service:
    type: ClusterIP
    port: 3001
  internalService:
    enabled: true
    port: 3002

web:
  enabled: true
  replicaCount: 2
  revisionHistoryLimit: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  image:
    name: web
    tag: ""
    pullPolicy: IfNotPresent
  env:
    NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_live_Y2xlcmsucGVyc2FpLmRldiQ
    NEXT_PUBLIC_CLERK_PROXY_URL: "https://persai.dev/clerk-proxy"
    NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
    NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
    PERSAI_WEB_API_PROXY_TARGET: "http://api:3001"
  secretEnv:
    CLERK_SECRET_KEY:
      secretName: persai-api-secrets
      secretKey: CLERK_SECRET_KEY
  probes:
    readiness:
      path: /api/ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /api/health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    # Keep HPA explicit but disabled until SR2 gets target-environment evidence for
    # request-driven scaling and safe interaction with long-lived web traffic.
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
  service:
    type: ClusterIP
    port: 3000
  # Long SSE streams (e.g. image generation ~30s+) exceed GCLB default ~30s idle timeout without this.
  backendConfig:
    enabled: true
    name: persai-web-backend-config
    timeoutSec: 3600

openclaw:
  enabled: true
  replicaCount: 1
  revisionHistoryLimit: 2
  minReadySeconds: 10
  strategy:
    type: Recreate
  runtimePools:
    defaultPoolKey: free_shared_restricted
    pools:
      free_shared_restricted:
        enabled: false
        config: {}
      free_shared_restricted_sandbox:
        enabled: true
        config:
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: "1"
              memory: 2Gi
              ephemeral-storage: 1Gi
          sandboxRuntime:
            enabled: true
            dind:
              resources:
                requests:
                  cpu: 250m
                  memory: 768Mi
                limits:
                  cpu: "1"
                  memory: 1280Mi
          sessionMaintenance:
            maxEntries: 500
            maxDiskBytes: 256mb
            highWaterBytes: 200mb
            rotateBytes: 10mb
          agentDefaults:
            sandbox:
              mode: "all"
              backend: docker
              docker:
                image: ""
                pidsLimit: 64
                memory: 512m
                memorySwap: 512m
                cpus: 0.5
      paid_shared_restricted:
        enabled: false
        config: {}
      paid_shared_restricted_sandbox:
        enabled: true
        config:
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
              ephemeral-storage: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
              ephemeral-storage: 2Gi
          sandboxRuntime:
            enabled: true
            dind:
              resources:
                requests:
                  cpu: 500m
                  memory: 1280Mi
                limits:
                  cpu: "1"
                  memory: 2304Mi
          sessionMaintenance:
            maxEntries: 1000
            maxDiskBytes: 1gb
            highWaterBytes: 800mb
          agentDefaults:
            sandbox:
              mode: "all"
              backend: docker
              docker:
                image: ""
                pidsLimit: 128
                memory: 1g
                memorySwap: 1g
                cpus: 1
      paid_isolated:
        enabled: true
        config:
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
              ephemeral-storage: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
              ephemeral-storage: 5Gi
          sandboxRuntime:
            enabled: true
            dind:
              resources:
                requests:
                  cpu: "1"
                  memory: 2304Mi
                limits:
                  cpu: "2"
                  memory: 4352Mi
          sessionMaintenance:
            maxEntries: 2000
            maxDiskBytes: 2gb
            highWaterBytes: 1600mb
          agentDefaults:
            sandbox:
              mode: "all"
              backend: docker
              docker:
                image: ""
                pidsLimit: 256
                memory: 2g
                memorySwap: 2g
                cpus: 2
  sandboxImages:
    base:
      name: openclaw-sandbox
      tag: e4f73e39c64064d74d4127e7eebbb881054fdf78
      digest: ""
    common:
      name: openclaw-sandbox-common
      tag: e4f73e39c64064d74d4127e7eebbb881054fdf78
      digest: ""
  serviceAccount:
    create: true
    name: openclaw-sa
    gcpServiceAccountEmail: openclaw-runtime@project-44786b14-b7d7-4554-a8a.iam.gserviceaccount.com
  image:
    name: openclaw




    tag: e09ce44df81821c19efda6583063c6b679a73687
    digest: sha256:bfac94719806391d42c0ef135b2757e70775e80ef19e603a01819802b0855a6c

    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
      ephemeral-storage: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi
  controlUi:
    allowedOrigins:
      - http://localhost:18789
      - http://127.0.0.1:18789
    dangerouslyAllowHostHeaderOriginFallback: false
  persaiSecretResolver:
    baseUrl: http://api-internal:3002
  sessionMaintenance:
    mode: enforce
    pruneAfter: 14d
    maxEntries: 2000
    rotateBytes: 25mb
    resetArchiveRetention: 14d
    maxDiskBytes: 2gb
    highWaterBytes: 1600mb
  tools:
    deny:
      - gateway
      - nodes
      - canvas
      - agents_list
      - session_status
      - sessions_list
      - sessions_history
      - sessions_send
      - sessions_spawn
      - sessions_yield
      - subagents
    sandbox:
      tools:
        allow:
          - exec
          - process
          - read
          - write
          - edit
          - apply_patch
          - image
          - web_search
          - web_fetch
          - image_generate
          - tts
          - browser
          - memory_search
          - memory_get
          - reminder_task
          - persai_tool_quota_status
          - persai_workspace_attach
          - pdf
          - message
        deny:
          - cron
          - canvas
          - nodes
          - gateway
          - telegram
          - whatsapp
          - discord
          - irc
          - googlechat
          - slack
          - signal
          - imessage
          - line
  workspace:
    gcsFuse:
      enabled: true
      bucketName: persai-dev-workspaces
      mountPath: /mnt/workspaces/persai
      mountOptions: "uid=1000,gid=1000"
  tts:
    auto: "off"
    mode: final
  agentDefaults:
    modelPrimary: openai/gpt-5.4
    sandbox:
      # Shared non-sandbox baseline. The *_sandbox pools override this with a
      # Docker-backed sandbox path and separate rollout surface.
      mode: "off"
      backend: docker
      scope: session
      workspaceAccess: rw
      sessionToolsVisibility: spawned
      docker:
        image: ""
        network: none
        readOnlyRoot: true
        user: "0:0"
        capDrop:
          - ALL
        pidsLimit: 256
        memory: 1g
        memorySwap: 1g
        cpus: 1
  sandboxRuntime:
    enabled: false
    dockerSocketPath: /run/user/1000/docker.sock
    dockerHost: unix:///run/user/1000/docker.sock
    preloadSandboxImage: true
    startupProbe:
      failureThreshold: 180
      periodSeconds: 5
    dind:
      image: docker:29.3.1-dind-rootless
      pullPolicy: IfNotPresent
      env: {}
      resources: {}
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  topologySpreadConstraints: []
  args:
    - --allow-unconfigured
    - --bind
    - lan
    - --port
    - "18789"
  env:
    TZ: UTC
    PERSAI_API_BASE_URL: "http://api-internal:3002"
    # Supported PersAI/OpenClaw runtime contract remains one pod per runtime pool.
    PERSAI_RUNTIME_READINESS_MODE: "single_replica"
    PERSAI_RUNTIME_SPEC_STORE: "redis"
    PERSAI_RUNTIME_SPEC_STORE_KEY_PREFIX: "persai:runtime-spec"
    PERSAI_RUNTIME_SPEC_STORE_TTL_SECONDS: "0"
    PERSAI_WORKSPACE_ROOT: /mnt/workspaces/persai
    OPENCLAW_STATE_DIR: /mnt/workspaces/persai/.openclaw-state
  secretEnv:
    OPENCLAW_GATEWAY_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: OPENCLAW_GATEWAY_TOKEN
    PERSAI_INTERNAL_API_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: PERSAI_INTERNAL_API_TOKEN
    PERSAI_RUNTIME_SPEC_STORE_REDIS_URL:
      secretName: persai-openclaw-secrets
      secretKey: PERSAI_RUNTIME_SPEC_STORE_REDIS_URL
    # Value only in cluster Secret key `OPENAI_API_KEY` (never put the sk-... string in Git).
    OPENAI_API_KEY:
      secretName: persai-openclaw-secrets
      secretKey: OPENAI_API_KEY
  telegramWebhook:
    enabled: true
  service:
    type: ClusterIP
    port: 18789

ingress:
  enabled: true
  staticIpName: persai-dev-ip
  hosts:
    web: persai.dev
    api: api.persai.dev
    bot: bot.persai.dev
  certificates:
    - name: persai-web-cert
      domain: persai.dev
    - name: persai-api-cert
      domain: api.persai.dev
    - name: persai-bot-cert
      domain: bot.persai.dev
