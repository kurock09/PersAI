global:
  namespace: persai-dev
  images:
    registryHost: europe-west1-docker.pkg.dev
    projectId: project-44786b14-b7d7-4554-a8a
    repository: persai
    tag: 4769e960be23213b95a8efbff069ff22d8c48ed7

networkPolicy:
  enabled: true
  apiIngress:
    # Recommended starter block for GKE-backed prod-like rollout:
    # 1. Replace these commented examples with the real pod-visible/public ingress proxy CIDRs
    #    that represent api.persai.dev in the CURRENT GKE path.
    # 2. For classic GCLB/GFE-backed paths, start validation from official Google LB docs.
    # 3. Keep this list empty until you have verified the real ranges; the API policy stays gated.
    #
    # Example starter values to verify before uncommenting:
    # publicIpBlocks:
    #   - 35.191.0.0/16
    #   - 130.211.0.0/22
    # Public API ingress CIDRs (for GCLB or other trusted ingress hops). When empty
    # and ingress is enabled, the API NetworkPolicy will not be rendered.
    publicIpBlocks:
      - 35.191.0.0/16
      - 130.211.0.0/22
    # Additional internal callers allowed to the public API port.
    extraFromIpBlocks: []
  openclawIngress:
    # Recommended starter block for GKE-backed Telegram webhook rollout:
    # 1. Put pod-visible trusted ingress/proxy CIDRs here FIRST.
    # 2. In many GKE Ingress-backed paths this starts from Google LB/GFE/backend
    #    health/proxy ranges, not from Telegram sender IPs alone.
    # 3. Keep this list empty until you have verified the real pod-visible ranges;
    #    the OpenClaw ingress policy stays gated while empty.
    #
    # Example starter values to verify before uncommenting:
    # trustedIngressIpBlocks:
    #   - 35.191.0.0/16
    #   - 130.211.0.0/22
    trustedIngressIpBlocks:
      - 35.191.0.0/16
      - 130.211.0.0/22
    # Optional supplemental Telegram sender CIDRs only if they are ACTUALLY pod-visible
    # in your deployed ingress path. Do not treat this list as the primary GKE allowlist.
    #
    # Current official Telegram webhook guide references:
    # telegramWebhookIpBlocks:
    #   - 149.154.160.0/20
    #   - 91.108.4.0/22
    telegramWebhookIpBlocks: []

api:
  enabled: true
  replicaCount: 1
  serviceAccount:
    create: true
    name: api-sa
    gcpServiceAccountEmail: api-runtime@project-44786b14-b7d7-4554-a8a.iam.gserviceaccount.com
  image:
    name: api
    tag: ""
    pullPolicy: IfNotPresent
  cloudSqlProxy:
    enabled: true
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.18.3
    port: 5432
    instanceConnectionName: project-44786b14-b7d7-4554-a8a:europe-west1:persai-dev-postgres
    usePrivateIp: true
  env:
    APP_ENV: dev
    PORT: "3001"
    API_INTERNAL_PORT: "3002"
    LOG_LEVEL: info
    GCP_PROJECT_ID: project-44786b14-b7d7-4554-a8a
    GCP_REGION: europe-west1
    OPENCLAW_ADAPTER_ENABLED: "true"
    OPENCLAW_BASE_URL_FREE_SHARED_RESTRICTED: "http://openclaw-free-shared-restricted:18789"
    OPENCLAW_BASE_URL_PAID_SHARED_RESTRICTED: "http://openclaw-paid-shared-restricted:18789"
    OPENCLAW_BASE_URL_PAID_ISOLATED: "http://openclaw-paid-isolated:18789"
    OPENCLAW_ADAPTER_TIMEOUT_MS: "90000"
    TELEGRAM_WEBHOOK_BASE_URL: "https://bot.persai.dev"
    WEB_ACTIVE_CHATS_CAP: "20"
    QUOTA_TOKEN_BUDGET_DEFAULT: "200000"
    QUOTA_COST_OR_TOKEN_DRIVING_TOOL_UNITS_DEFAULT: "1000"
    # Only these PersAI AppUser emails may use /api/v1/admin/* (must still pass role checks, e.g. workspace owner).
    PERSAI_ADMIN_ALLOWLIST_EMAILS: "kurock09@gmail.com"
  secretEnv:
    DATABASE_URL:
      secretName: persai-api-secrets
      secretKey: DATABASE_URL
    CLERK_SECRET_KEY:
      secretName: persai-api-secrets
      secretKey: CLERK_SECRET_KEY
    ADMIN_STEP_UP_HMAC_SECRET:
      secretName: persai-api-secrets
      secretKey: ADMIN_STEP_UP_HMAC_SECRET
      optional: true
    RUNTIME_PROVIDER_SECRETS_MASTER_KEY:
      secretName: persai-api-secrets
      secretKey: RUNTIME_PROVIDER_SECRETS_MASTER_KEY
      optional: true
    TELEGRAM_WEBHOOK_HMAC_SECRET:
      secretName: persai-api-secrets
      secretKey: TELEGRAM_WEBHOOK_HMAC_SECRET
      optional: true
    OPENCLAW_GATEWAY_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: OPENCLAW_GATEWAY_TOKEN
    PERSAI_INTERNAL_API_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: PERSAI_INTERNAL_API_TOKEN
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  service:
    type: ClusterIP
    port: 3001
  internalService:
    enabled: true
    port: 3002

web:
  enabled: true
  replicaCount: 1
  image:
    name: web
    tag: ""
    pullPolicy: IfNotPresent
  env:
    NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_live_Y2xlcmsucGVyc2FpLmRldiQ
    NEXT_PUBLIC_CLERK_PROXY_URL: "https://persai.dev/clerk-proxy"
    NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
    NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
    PERSAI_WEB_API_PROXY_TARGET: "http://api:3001"
  secretEnv:
    CLERK_SECRET_KEY:
      secretName: persai-api-secrets
      secretKey: CLERK_SECRET_KEY
  probes:
    readiness:
      path: /api/ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /api/health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  service:
    type: ClusterIP
    port: 3000
  # Long SSE streams (e.g. image generation ~30s+) exceed GCLB default ~30s idle timeout without this.
  backendConfig:
    enabled: true
    name: persai-web-backend-config
    timeoutSec: 3600

openclaw:
  enabled: true
  replicaCount: 1
  runtimePools:
    defaultPoolKey: free_shared_restricted
    pools:
      free_shared_restricted:
        enabled: true
        config: {}
      paid_shared_restricted:
        enabled: true
        config: {}
      paid_isolated:
        enabled: true
        config: {}
  serviceAccount:
    create: true
    name: openclaw-sa
    gcpServiceAccountEmail: openclaw-runtime@project-44786b14-b7d7-4554-a8a.iam.gserviceaccount.com
  image:
    name: openclaw




    tag: 31ec4f70d76eebfef933754934ee922c9d094c11
    digest: sha256:49bf11de9b08124aba4e69a7b81bc04bce1651078f1d39cf9357be2b506eca36

    pullPolicy: IfNotPresent
  controlUi:
    allowedOrigins:
      - http://localhost:18789
      - http://127.0.0.1:18789
    dangerouslyAllowHostHeaderOriginFallback: false
  persaiSecretResolver:
    baseUrl: http://api-internal:3002
  sessionMaintenance:
    mode: enforce
    pruneAfter: 14d
    maxEntries: 2000
    rotateBytes: 25mb
    resetArchiveRetention: 14d
    maxDiskBytes: 2gb
    highWaterBytes: 1600mb
  tools:
    deny:
      - gateway
      - nodes
      - canvas
      - agents_list
      - session_status
      - sessions_list
      - sessions_history
      - sessions_send
      - sessions_spawn
      - sessions_yield
      - subagents
  workspace:
    gcsFuse:
      enabled: true
      bucketName: persai-dev-workspaces
      mountPath: /mnt/workspaces/persai
      mountOptions: "uid=1000,gid=1000"
  tts:
    auto: "off"
    mode: final
  agentDefaults:
    modelPrimary: openai/gpt-5.4
    sandbox:
      # Keep sandbox disabled in the current GKE shape until OpenClaw has a real
      # sandbox backend/container strategy in-cluster. These limits are the
      # prepared restricted baseline for the later tiered pools.
      mode: "off"
      scope: agent
      workspaceAccess: rw
      sessionToolsVisibility: spawned
      docker:
        network: none
        readOnlyRoot: true
        capDrop:
          - ALL
        pidsLimit: 256
        memory: 1g
        memorySwap: 1g
        cpus: 1
  args:
    - --allow-unconfigured
    - --bind
    - lan
    - --port
    - "18789"
  env:
    TZ: UTC
    PERSAI_API_BASE_URL: "http://api-internal:3002"
    PERSAI_RUNTIME_SPEC_STORE: "redis"
    PERSAI_RUNTIME_SPEC_STORE_KEY_PREFIX: "persai:runtime-spec"
    PERSAI_RUNTIME_SPEC_STORE_TTL_SECONDS: "0"
    PERSAI_WORKSPACE_ROOT: /mnt/workspaces/persai
    OPENCLAW_STATE_DIR: /mnt/workspaces/persai/.openclaw-state
  secretEnv:
    OPENCLAW_GATEWAY_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: OPENCLAW_GATEWAY_TOKEN
    PERSAI_INTERNAL_API_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: PERSAI_INTERNAL_API_TOKEN
    PERSAI_RUNTIME_SPEC_STORE_REDIS_URL:
      secretName: persai-openclaw-secrets
      secretKey: PERSAI_RUNTIME_SPEC_STORE_REDIS_URL
    # Value only in cluster Secret key `OPENAI_API_KEY` (never put the sk-... string in Git).
    OPENAI_API_KEY:
      secretName: persai-openclaw-secrets
      secretKey: OPENAI_API_KEY
  telegramWebhook:
    enabled: true
  service:
    type: ClusterIP
    port: 18789

ingress:
  enabled: true
  staticIpName: persai-dev-ip
  hosts:
    web: persai.dev
    api: api.persai.dev
    bot: bot.persai.dev
  certificates:
    - name: persai-web-cert
      domain: persai.dev
    - name: persai-api-cert
      domain: api.persai.dev
    - name: persai-bot-cert
      domain: bot.persai.dev
