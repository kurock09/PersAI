global:
  namespace: persai-dev
  images:
    registryHost: europe-west1-docker.pkg.dev
    projectId: project-44786b14-b7d7-4554-a8a
    repository: persai
    # Fallback image tag for services NOT explicitly rebuilt in a given push.
    # When a service IS rebuilt, its per-service image.tag below MUST be pinned
    # to the new digest. Never rely on this global tag for a freshly published
    # service — the stale global value will silently shadow the new image until
    # the next full-rebuild push. See ADR-102 Slice 9 and docs/TEST-PLAN.md.
    tag: ddc3aadfca11cc6fabe7d3e8c9e60aca9124c525

networkPolicy:
  # Renders Kubernetes NetworkPolicy API objects only.
  # ADR-146 Slice 0.1: enabling the Calico engine is NOT controlled here.
  # See infra/bootstrap/adr146-sandbox-egress-foundation.json + RUNBOOK
  # (gcloud --enable-network-policy recreates nodes). Structural verify is the
  # release gate before ADR-146 app rollout.
  # ADR-146 S2: sandbox.enabled requires networkPolicy.enabled=true (chart fail).
  enabled: true
  sandboxDns:
    # Live GKE kube-dns + NodeLocal DNSCache listeners audited 2026-07-12.
    # Do not replace these /32s with a kube-system selector or broad link-local.
    # peerMode=ipBlockOnly is the restricted DNS selector contract (ADR-146 D3).
    peerMode: ipBlockOnly
    allowedCidrs:
      - 169.254.20.10/32
      - 34.118.224.10/32
    ports:
      - protocol: UDP
        port: 53
      - protocol: TCP
        port: 53
  sandboxEgress:
    # Values-owned fail-closed inventory for Squid's public 80/443 egress and
    # additive full-public exec TCP/UDP egress (shared deny set).
    # Includes special-use space and every audited live VPC, Pod, Service,
    # PSA, Redis, Filestore, peered range, and the reviewed public GKE
    # control-plane /32 even where a broad private range already contains the
    # environment-specific entry.
    # Current environment contract is IPv4-only. IPv6/dual-stack is unsupported
    # and chart validation fails until a future audited deny inventory lands.
    ipFamily: IPv4
    modeLabelKey: persai.io/sandbox-egress
    restrictedLabelValue: restricted
    fullPublicLabelValue: full-public
    requiredDeniedCidrs: &sandboxRequiredDeniedCidrs
      - 0.0.0.0/8
      - 10.0.0.0/8
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 169.254.0.0/16
      - 172.16.0.0/12
      - 192.0.0.0/24
      - 192.0.2.0/24
      - 192.88.99.0/24
      - 192.168.0.0/16
      - 198.18.0.0/15
      - 198.51.100.0/24
      - 203.0.113.0/24
      - 224.0.0.0/4
      - 240.0.0.0/4
      - 34.118.224.0/20
      - 34.38.46.10/32
      - 10.107.128.0/17
      - 10.109.0.0/20
      - 10.128.0.0/20
      - 10.132.0.0/20
      - 10.138.0.0/20
      - 10.140.0.0/20
      - 10.142.0.0/20
      - 10.146.0.0/20
      - 10.148.0.0/20
      - 10.150.0.0/20
      - 10.152.0.0/20
      - 10.154.0.0/20
      - 10.156.0.0/20
      - 10.158.0.0/20
      - 10.160.0.0/20
      - 10.162.0.0/20
      - 10.164.0.0/20
      - 10.166.0.0/20
      - 10.168.0.0/20
      - 10.170.0.0/20
      - 10.172.0.0/20
      - 10.174.0.0/20
      - 10.178.0.0/20
      - 10.180.0.0/20
