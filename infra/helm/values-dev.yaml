    type: ClusterIP
    port: 3000
  # Long SSE streams (e.g. image generation ~30s+) exceed GCLB default ~30s idle timeout without this.
  backendConfig:
    enabled: true
    name: persai-web-backend-config
    timeoutSec: 3600

providerGateway:
  enabled: true
  replicaCount: 2
  revisionHistoryLimit: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
