global:
  namespace: persai-dev
  images:
    registryHost: europe-west1-docker.pkg.dev
    projectId: project-44786b14-b7d7-4554-a8a
    repository: persai
    tag: 068fdbcedba16adea9ccc40e408813888accd58a

api:
  enabled: true
  replicaCount: 1
  serviceAccount:
    create: true
    name: api-sa
    gcpServiceAccountEmail: api-runtime@project-44786b14-b7d7-4554-a8a.iam.gserviceaccount.com
  image:
    name: api
    tag: ""
    pullPolicy: IfNotPresent
  cloudSqlProxy:
    enabled: true
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.18.3
    port: 5432
    instanceConnectionName: project-44786b14-b7d7-4554-a8a:europe-west1:persai-dev-postgres
    usePrivateIp: true
  env:
    APP_ENV: dev
    PORT: "3001"
    LOG_LEVEL: info
    GCP_PROJECT_ID: project-44786b14-b7d7-4554-a8a
    GCP_REGION: europe-west1
    OPENCLAW_ADAPTER_ENABLED: "true"
    OPENCLAW_BASE_URL: "http://openclaw:18789"
    WEB_ACTIVE_CHATS_CAP: "20"
    QUOTA_TOKEN_BUDGET_DEFAULT: "200000"
    QUOTA_COST_OR_TOKEN_DRIVING_TOOL_UNITS_DEFAULT: "1000"
  secretEnv:
    DATABASE_URL:
      secretName: persai-api-secrets
      secretKey: DATABASE_URL
    CLERK_SECRET_KEY:
      secretName: persai-api-secrets
      secretKey: CLERK_SECRET_KEY
    OPENCLAW_GATEWAY_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: OPENCLAW_GATEWAY_TOKEN
  service:
    type: ClusterIP
    port: 3001

web:
  enabled: true
  replicaCount: 1
  image:
    name: web
    tag: ""
    pullPolicy: IfNotPresent
  env:
    NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_a2Vlbi1yb2Jpbi04MC5jbGVyay5hY2NvdW50cy5kZXYk
  secretEnv:
    CLERK_SECRET_KEY:
      secretName: persai-api-secrets
      secretKey: CLERK_SECRET_KEY
  service:
    type: ClusterIP
    port: 3000

openclaw:
  enabled: true
  replicaCount: 1
  image:
    name: openclaw
    tag: 6ea3b32535d38e0884d8770e74483260caaf1a53
    digest: sha256:9902b6b161dd1fbe37df8ee58fee142916428821bf8954a538d095d12d07c7b5
    pullPolicy: IfNotPresent
  controlUi:
    allowedOrigins:
      - http://localhost:18789
      - http://127.0.0.1:18789
    dangerouslyAllowHostHeaderOriginFallback: false
  args:
    - --allow-unconfigured
    - --bind
    - lan
    - --port
    - "18789"
  env:
    TZ: UTC
    PERSAI_RUNTIME_SPEC_STORE: "memory"
    PERSAI_RUNTIME_SPEC_STORE_KEY_PREFIX: "persai:runtime-spec"
    PERSAI_RUNTIME_SPEC_STORE_TTL_SECONDS: "0"
    # For shared store / multi-replica OpenClaw, switch mode to `redis`
    # and provide `PERSAI_RUNTIME_SPEC_STORE_REDIS_URL` (prefer Secret-backed env when auth is required).
    # PERSAI_RUNTIME_SPEC_STORE_REDIS_URL: "redis://openclaw-runtime-redis:6379/0"
  secretEnv:
    OPENCLAW_GATEWAY_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: OPENCLAW_GATEWAY_TOKEN
    # Value only in cluster Secret key `OPENAI_API_KEY` (never put the sk-... string in Git).
    OPENAI_API_KEY:
      secretName: persai-openclaw-secrets
      secretKey: OPENAI_API_KEY
  service:
    type: ClusterIP
    port: 18789
