    type: ClusterIP
    port: 3013
  egressProxy:
    enabled: true
    # ubuntu/squid 6.x on Ubuntu 24.04 — Squid forward proxy for exec pod outbound traffic.
    image: "ubuntu/squid:6.6-24.04_edge"
    port: 3128
    # Domain allowlist — only these domains are reachable from exec pods via the proxy.
    # Each entry is justified; add new entries only with explicit justification.
    # Squid dstdomain semantics: a leading-dot entry matches the apex domain AND all
    # subdomains, so the dotted form already covers the apex and all subdomains. Listing
    # both the apex and dotted forms together is a FATAL Squid config error
    # ("'.pypi.org' is a subdomain of 'pypi.org'"). Use the dotted form only.
    allowedDomains:
      # Python Package Index: pip install requires pypi.org (index) and files.pythonhosted.org (wheels/sdists).
      - .pypi.org
      - .files.pythonhosted.org
      # npm registry: npm/npx install requires registry.npmjs.org.
      - .registry.npmjs.org
      # npm website + auth endpoints (registry.npmjs.org is the actual install target;
      # this widens for completeness per ADR-126 D3).
      - .npmjs.com
      # GitHub: git clone, pip install from VCS, and release/asset downloads.
      # Dotted form covers the apex plus api./codeload. subdomains.
      - .github.com
      # GitHub raw/object hosts: raw.githubusercontent.com, objects.githubusercontent.com
      # (used by pip/npm tarball fetches and raw file pulls).
      - .githubusercontent.com
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

sandboxExec:
  image:
    # Exec image name in GAR (matches the service name in detect-affected + pin script).
    name: sandbox-exec
    # Initial tag; CI pins this to the SHA of the most recent successful build.
    tag: 8170f23869eed89eaf1edffabd48ee886fb2bfd2
  # ADR-123 Slice 3 warm-pool follow-up: a DaemonSet that keeps the exec image pulled on
  # every sandbox node so cold-start exec pods skip the multi-GB image pull. Pairs with a
  # >=1 minimum node on the sandbox pool (set via node-pool autoscaling — see RUNBOOK).
  prepull:
    enabled: true

ingress:
  enabled: true
  staticIpName: persai-dev-ip
  hosts:
    web: persai.dev
    api: api.persai.dev
    bot: bot.persai.dev
  certificates:
    - name: persai-web-cert
      domain: persai.dev
    - name: persai-api-cert
      domain: api.persai.dev
    - name: persai-bot-cert
      domain: bot.persai.dev
