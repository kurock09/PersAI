    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  env:
    APP_ENV: dev
    PORT: "3011"
    LOG_LEVEL: info
    GCP_PROJECT_ID: project-44786b14-b7d7-4554-a8a
