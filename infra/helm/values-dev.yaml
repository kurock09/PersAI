    name: provider-gateway
    tag: ce5d7f06b9db1391b52082cbff58c4791f17046b
    pullPolicy: IfNotPresent
  env:
    APP_ENV: dev
    PORT: "3011"
    LOG_LEVEL: info
    GCP_PROJECT_ID: project-44786b14-b7d7-4554-a8a
    GCP_REGION: europe-west1
    PERSAI_API_BASE_URL: "http://api-internal:3002"
    PROVIDER_GATEWAY_WARM_ON_BOOT: "true"
    PROVIDER_GATEWAY_WARMUP_TIMEOUT_MS: "5000"
    PROVIDER_GATEWAY_OPENAI_MODELS: "gpt-5.4"
    PROVIDER_GATEWAY_ANTHROPIC_MODELS: "claude-sonnet-4-5"
    # ADR-119 Slice 14 / live-test enablement: dev-only full-rate request payload
    # dump on the dedicated `persai.debug.provider` logger. Dumps are bounded
    # (500-char system edges, 500-char message previews, base64 redacted) and
    # gated by `shouldDump()`; keep this OFF in production values files.
    PERSAI_DEBUG_PROVIDER_PAYLOAD: "true"
    PERSAI_DEBUG_PROVIDER_PAYLOAD_RATE: "1.0"
  secretEnv:
    PERSAI_INTERNAL_API_TOKEN:
      secretName: persai-runtime-secrets
      secretKey: PERSAI_INTERNAL_API_TOKEN
    PROVIDER_GATEWAY_ANTHROPIC_API_KEY:
      secretName: persai-runtime-secrets
      secretKey: ANTHROPIC_API_KEY
      optional: true
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
  service:
    type: ClusterIP
    port: 3011

