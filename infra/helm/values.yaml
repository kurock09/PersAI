sandbox:
  enabled: false
  replicaCount: 2
  revisionHistoryLimit: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  serviceAccount:
    create: true
    name: sandbox-sa
    gcpServiceAccountEmail: ""
  execServiceAccount:
    create: true
    name: sandbox-exec-sa
    # Must stay empty — no Workload Identity / GCP IAM on untrusted exec pods.
    gcpServiceAccountEmail: ""
  execEgress:
    # ADR-146 S2 Helm/pod-spec contract. S3 selects mode at runtime; chart
    # default must remain restricted (fail-closed if changed).
    defaultMode: restricted
    contractConfigMap:
      create: true
      name: sandbox-exec-egress-mode-contract
  image:
    name: sandbox
    tag: ""
    pullPolicy: IfNotPresent
  cloudSqlProxy:
    enabled: false
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.18.3
    port: 5432
    instanceConnectionName: ""
    usePrivateIp: true
  env:
    APP_ENV: dev
    PORT: "3013"
    LOG_LEVEL: info
    GCP_PROJECT_ID: ""
    GCP_REGION: ""
    PERSAI_MEDIA_BUCKET_NAME: ""
    PERSAI_MEDIA_OBJECT_PREFIX: "fs"
    SANDBOX_MAX_PENDING_JOBS: "16"
    SANDBOX_MAX_PENDING_JOBS_PER_WORKSPACE: "4"
    SANDBOX_MAX_POLL_WAIT_MS: "1500"
    SANDBOX_QUEUED_JOB_STALE_AFTER_MS: "45000"
    SANDBOX_RUNNING_JOB_GRACE_MS: "15000"
    SANDBOX_EXEC_SERVICE_ACCOUNT_NAME: "sandbox-exec-sa"
  secretEnv:
    PERSAI_INTERNAL_API_TOKEN:
      secretName: persai-runtime-secrets
      secretKey: PERSAI_INTERNAL_API_TOKEN
    DATABASE_URL:
      secretName: persai-api-secrets
      secretKey: DATABASE_URL
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 1536Mi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
  service:
    type: ClusterIP
    port: 3013

ingress:
  enabled: false
  staticIpName: ""
  hosts:
    web: ""
    api: ""
    bot: ""
  certificates: []
