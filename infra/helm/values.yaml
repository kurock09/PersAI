    port: 5432
    instanceConnectionName: ""
    usePrivateIp: true
  env:
    APP_ENV: dev
    PORT: "3013"
    LOG_LEVEL: info
    GCP_PROJECT_ID: ""
    GCP_REGION: ""
    PERSAI_MEDIA_BUCKET_NAME: ""
    PERSAI_MEDIA_OBJECT_PREFIX: "assistant-media"
  secretEnv:
    PERSAI_INTERNAL_API_TOKEN:
      secretName: persai-runtime-secrets
      secretKey: PERSAI_INTERNAL_API_TOKEN
    DATABASE_URL:
      secretName: persai-api-secrets
      secretKey: DATABASE_URL
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 1536Mi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: false
