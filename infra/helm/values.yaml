global:
  namespace: persai-dev
  images:
    registryHost: europe-west1-docker.pkg.dev
    projectId: project-44786b14-b7d7-4554-a8a
    repository: persai
    tag: dev-main

networkPolicy:
  enabled: false
  apiIngress:
    # Public API ingress CIDRs (for GCLB or other trusted ingress hops). When empty
    # and ingress is enabled, the API NetworkPolicy will not be rendered.
    publicIpBlocks: []
    # Additional internal callers allowed to the public API port.
    extraFromIpBlocks: []
  openclawIngress:
    # Pod-visible trusted ingress/proxy CIDRs (for example GCLB/GFE/backend health-check
    # hops that actually reach the OpenClaw pod). Prefer this field for GKE Ingress-backed
    # webhook traffic.
    # Verify current ranges at rollout time against official Google/Telegram docs.
    trustedIngressIpBlocks: []
    # Optional extra sender CIDRs only if they really reach the pod directly in your path.
    # Do not assume Telegram client IPs are pod-visible when GKE Ingress fronts the service.
    telegramWebhookIpBlocks: []

api:
  enabled: true
  replicaCount: 2
  revisionHistoryLimit: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  migrations:
    enabled: true
    backoffLimit: 1
  serviceAccount:
    create: true
    name: api-sa
    gcpServiceAccountEmail: ""
  image:
    name: api
    tag: ""
    pullPolicy: IfNotPresent
  cloudSqlProxy:
    enabled: false
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.18.3
    port: 5432
    instanceConnectionName: ""
    usePrivateIp: true
  env:
    APP_ENV: dev
    PORT: "3001"
    API_INTERNAL_PORT: "3002"
    LOG_LEVEL: info
    GCP_PROJECT_ID: ""
    GCP_REGION: ""
    OPENCLAW_ADAPTER_ENABLED: "false"
    OPENCLAW_BASE_URL_FREE_SHARED_RESTRICTED: ""
    OPENCLAW_BASE_URL_PAID_SHARED_RESTRICTED: ""
    OPENCLAW_BASE_URL_PAID_ISOLATED: ""
    WEB_ACTIVE_CHATS_CAP: "20"
    QUOTA_TOKEN_BUDGET_DEFAULT: "200000"
    QUOTA_COST_OR_TOKEN_DRIVING_TOOL_UNITS_DEFAULT: "1000"
  secretEnv:
    DATABASE_URL:
      secretName: persai-api-secrets
      secretKey: DATABASE_URL
    CLERK_SECRET_KEY:
      secretName: persai-api-secrets
      secretKey: CLERK_SECRET_KEY
    ADMIN_STEP_UP_HMAC_SECRET:
      secretName: persai-api-secrets
      secretKey: ADMIN_STEP_UP_HMAC_SECRET
      optional: true
    RUNTIME_PROVIDER_SECRETS_MASTER_KEY:
      secretName: persai-api-secrets
      secretKey: RUNTIME_PROVIDER_SECRETS_MASTER_KEY
      optional: true
    OPENCLAW_GATEWAY_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: OPENCLAW_GATEWAY_TOKEN
    PERSAI_INTERNAL_API_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: PERSAI_INTERNAL_API_TOKEN
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    # Keep HPA explicit but disabled until SR3 owns request-path and dependency
    # scaling behavior under real target-environment evidence.
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
  service:
    type: ClusterIP
    port: 3001
  internalService:
    enabled: true
    port: 3002

web:
  enabled: true
  replicaCount: 2
  revisionHistoryLimit: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  image:
    name: web
    tag: ""
    pullPolicy: IfNotPresent
  env:
    NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ""
    NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
    NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
  secretEnv:
    CLERK_SECRET_KEY:
      secretName: persai-api-secrets
      secretKey: CLERK_SECRET_KEY
  probes:
    readiness:
      path: /api/ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /api/health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    # Keep HPA explicit but disabled until SR2 has deploy/observe evidence for
    # web scaling behavior in the target environment.
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
  service:
    type: ClusterIP
    port: 3000
  # GKE Ingress (GCLB): default backend timeout is ~30s; SSE chat/image tools need longer.
  backendConfig:
    enabled: false
    name: persai-web-backend-config
    timeoutSec: 3600

openclaw:
  enabled: false
  replicaCount: 1
  revisionHistoryLimit: 2
  minReadySeconds: 10
  strategy:
    type: Recreate
  runtimePools:
    defaultPoolKey: free_shared_restricted
    pools:
      free_shared_restricted:
        enabled: true
        config: {}
      paid_shared_restricted:
        enabled: false
        config: {}
      paid_isolated:
        enabled: false
        config: {}
  sandboxImages:
    base:
      name: openclaw-sandbox
      tag: ""
      digest: ""
    common:
      name: openclaw-sandbox-common
      tag: ""
      digest: ""
  serviceAccount:
    create: false
    name: openclaw-sa
    gcpServiceAccountEmail: ""
  image:
    name: openclaw
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
      ephemeral-storage: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi
  configPath: /app/openclaw-dev.json
  controlUi:
    allowedOrigins:
      - http://localhost:18789
      - http://127.0.0.1:18789
    dangerouslyAllowHostHeaderOriginFallback: false
  persaiSecretResolver:
    baseUrl: http://api-internal:3002
  sessionMaintenance:
    mode: enforce
    pruneAfter: 14d
    maxEntries: 2000
    rotateBytes: 25mb
    resetArchiveRetention: 14d
    maxDiskBytes: 2gb
    highWaterBytes: 1600mb
  tools:
    deny:
      - gateway
      - nodes
      - canvas
      - agents_list
      - session_status
      - sessions_list
      - sessions_history
      - sessions_send
      - sessions_spawn
      - sessions_yield
      - subagents
  workspace:
    gcsFuse:
      enabled: false
      bucketName: ""
      mountPath: /mnt/workspaces/persai
      mountOptions: ""
  command:
    - node
    - openclaw.mjs
    - gateway
  args:
    - --bind
    - loopback
    - --port
    - "18789"
  env:
    TZ: UTC
    PERSAI_API_BASE_URL: "http://api-internal:3002"
    # Supported PersAI/OpenClaw runtime contract remains one pod per runtime pool.
    PERSAI_RUNTIME_READINESS_MODE: "single_replica"
  agentDefaults:
    modelPrimary: openai/gpt-5.4
    sandbox:
      # Shared non-sandbox pools keep sandbox disabled by default.
      # Separate sandbox-capable pools override this with a real Docker-backed path.
      mode: "off"
      backend: docker
      scope: session
      workspaceAccess: rw
      sessionToolsVisibility: spawned
      docker:
        image: ""
        network: none
        readOnlyRoot: true
        capDrop:
          - ALL
        pidsLimit: 256
        memory: 1g
        memorySwap: 1g
        cpus: 1
  sandboxRuntime:
    enabled: false
    dockerSocketPath: /run/user/1000/docker.sock
    dockerHost: unix:///run/user/1000/docker.sock
    preloadSandboxImage: false
    preloadPullRetries: 3
    startupProbe:
      failureThreshold: 180
      periodSeconds: 5
    dind:
      image: docker:29.3.1-dind-rootless
      pullPolicy: IfNotPresent
      env: {}
      resources: {}
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  topologySpreadConstraints: []
  secretEnv:
    OPENCLAW_GATEWAY_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: OPENCLAW_GATEWAY_TOKEN
    PERSAI_INTERNAL_API_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: PERSAI_INTERNAL_API_TOKEN
  telegramWebhook:
    enabled: false
    host: ""
    managedCertificate: ""
    tlsSecretName: ""
  service:
    type: ClusterIP
    port: 18789

ingress:
  enabled: false
  staticIpName: ""
  hosts:
    web: ""
    api: ""
    bot: ""
  certificates: []
