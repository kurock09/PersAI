    PERSAI_API_BASE_URL: ""
    PROVIDER_GATEWAY_WARM_ON_BOOT: "true"
    PROVIDER_GATEWAY_WARMUP_TIMEOUT_MS: "5000"
    PROVIDER_GATEWAY_OPENAI_MODELS: "gpt-5.4"
    PROVIDER_GATEWAY_ANTHROPIC_MODELS: "claude-sonnet-4-5"
  secretEnv:
    PERSAI_INTERNAL_API_TOKEN:
      secretName: persai-runtime-secrets
      secretKey: PERSAI_INTERNAL_API_TOKEN
    PROVIDER_GATEWAY_ANTHROPIC_API_KEY:
      secretName: persai-runtime-secrets
      secretKey: ANTHROPIC_API_KEY
      optional: true
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
  service:
    type: ClusterIP
    port: 3011

runtime:
  enabled: false
  replicaCount: 2
  revisionHistoryLimit: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  serviceAccount:
    create: true
    name: runtime-sa
    gcpServiceAccountEmail: ""
  asyncJobContract:
    requiredVersion: "v1"
    gate:
      image: "curlimages/curl:8.17.0"
      backoffLimit: 1
      activeDeadlineSeconds: 120
  image:
    name: runtime
    tag: ""
    pullPolicy: IfNotPresent
  cloudSqlProxy:
    enabled: false
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.18.3
    port: 5432
    instanceConnectionName: ""
    usePrivateIp: true
  env:
    APP_ENV: dev
    PORT: "3012"
    LOG_LEVEL: info
    GCP_PROJECT_ID: ""
    GCP_REGION: ""
    PERSAI_API_BASE_URL: ""
    PERSAI_WEB_BASE_URL: ""
    PERSAI_MEDIA_BUCKET_NAME: ""
    PERSAI_MEDIA_OBJECT_PREFIX: "fs"
    RUNTIME_PROVIDER_GATEWAY_BASE_URL: ""
    RUNTIME_PROVIDER_GATEWAY_TIMEOUT_MS: "300000"
    RUNTIME_SANDBOX_BASE_URL: ""
    RUNTIME_SANDBOX_TIMEOUT_MS: "20000"
    ORPHAN_RECEIPT_GRACE_MS: "1200000"
  secretEnv:
    PERSAI_INTERNAL_API_TOKEN:
      secretName: persai-runtime-secrets
      secretKey: PERSAI_INTERNAL_API_TOKEN
    DATABASE_URL:
      secretName: persai-api-secrets
      secretKey: DATABASE_URL
    RUNTIME_STATE_REDIS_URL:
      secretName: persai-runtime-secrets
      secretKey: PERSAI_RUNTIME_SPEC_STORE_REDIS_URL
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 1536Mi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
