global:
  namespace: persai-dev
  images:
    registryHost: europe-west1-docker.pkg.dev
    projectId: project-44786b14-b7d7-4554-a8a
    repository: persai
    tag: dev-main

# ADR-161 temporary consumer-first accounting rollout. DELETE IN RELEASE C.
# Image floors use exact immutable tags; approvedImageTags is the explicit
# non-semver upgrade set permitted while a floor is active.
adr161TextUsageRollout:
  providerGatewayV2Producer: false
  runtimeV2Producer: false
  runtimeConsumerFloor:
    active: false
    imageTag: ""
    approvedImageTags: []
  apiConsumerFloor:
    active: false
    imageTag: ""
    approvedImageTags: []
  providerGatewayProducerFloor:
    active: false
    imageTag: ""
    approvedImageTags: []
  runtimeProducerFloor:
    active: false
    imageTag: ""
    approvedImageTags: []

networkPolicy:
  enabled: false
  sandboxDns:
    # ADR-146: peers are exact audited /32 ipBlocks only (NodeLocal + kube-dns
    # Service). Never kube-system namespaceSelector or broad DNS podSelectors.
    peerMode: ipBlockOnly
    allowedCidrs: []
    ports:
      - protocol: UDP
        port: 53
      - protocol: TCP
        port: 53
  sandboxEgress:
    # Complete environment-specific inventory is mandatory whenever sandbox
    # NetworkPolicies render. Every required entry must also be denied.
    # Shared by restricted Squid proxy, NAT probe, and full-public exec policy.
    # S2 emits 0.0.0.0/0 and therefore supports only this audited IPv4 contour.
    # IPv6/dual-stack must fail until a future environment inventory is reviewed.
    ipFamily: IPv4
    modeLabelKey: persai.io/sandbox-egress
    restrictedLabelValue: restricted
    fullPublicLabelValue: full-public
    requiredDeniedCidrs: []
    publicDeniedCidrs: []
  apiIngress:
    # Public API ingress CIDRs (for GCLB or other trusted ingress hops). When empty
    # and ingress is enabled, the API NetworkPolicy will not be rendered.
    publicIpBlocks: []
    # Additional internal callers allowed to the public API port.
    extraFromIpBlocks: []

api:
  enabled: true
  replicaCount: 2
  revisionHistoryLimit: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  migrations:
    enabled: true
    backoffLimit: 1
    ttlSecondsAfterFinished: 120
    activeDeadlineSeconds: 900
  asyncJobContract:
    # ADR-152 rollout gate: the API /ready response declares this exact
    # jobRef/status seam before runtime replicas that require it are admitted.
    version: "v1"
  serviceAccount:
    create: true
    name: api-sa
    gcpServiceAccountEmail: ""
  image:
    name: api
    tag: ""
    pullPolicy: IfNotPresent
  cloudSqlProxy:
    enabled: false
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.18.3
    port: 5432
    instanceConnectionName: ""
    usePrivateIp: true
  env:
    APP_ENV: dev
    PORT: "3001"
    API_INTERNAL_PORT: "3002"
    LOG_LEVEL: info
    # ADR-091 audit: default pool size for 1 vCPU pods => max(10, 1 × 4) = 10.
    PRISMA_CONNECTION_LIMIT: "10"
    GCP_PROJECT_ID: ""
    GCP_REGION: ""
    PERSAI_WEB_CHAT_SYNC_RUNTIME_MODE: "native"
    PERSAI_WEB_CHAT_STREAM_RUNTIME_MODE: "native"
    PERSAI_RUNTIME_BASE_URL: ""
    PERSAI_RUNTIME_BUNDLE_SYNC_TIMEOUT_MS: "10000"
    PERSAI_RUNTIME_TURN_TIMEOUT_MS: "300000"
    # ADR-149: whole-turn wall-clock ceiling (default 30 min) and progress-only idle stall (default 5 min).
    PERSAI_RUNTIME_TURN_WALL_CLOCK_MS: "1800000"
    PERSAI_RUNTIME_TURN_IDLE_STALL_MS: "300000"
    ORPHAN_ATTEMPT_GRACE_MS: "1200000"
    PERSAI_PROVIDER_GATEWAY_BASE_URL: ""
    PERSAI_PROVIDER_GATEWAY_WARMUP_TIMEOUT_MS: "10000"
    PERSAI_WEB_BASE_URL: ""
    PERSAI_MEDIA_BUCKET_NAME: ""
    PERSAI_MEDIA_OBJECT_PREFIX: "fs"
    PERSAI_SANDBOX_BASE_URL: ""
    PERSAI_SANDBOX_TIMEOUT_MS: "20000"
    PERSAI_SANDBOX_EGRESS_RECYCLE_TIMEOUT_MS: "300000"
    WEB_ACTIVE_CHATS_CAP: "20"
    QUOTA_TOKEN_BUDGET_DEFAULT: "200000"
    QUOTA_COST_OR_TOKEN_DRIVING_TOOL_UNITS_DEFAULT: "1000"
  secretEnv:
    DATABASE_URL:
      secretName: persai-api-secrets
      secretKey: DATABASE_URL
    CLERK_SECRET_KEY:
      secretName: persai-api-secrets
      secretKey: CLERK_SECRET_KEY
    ADMIN_STEP_UP_HMAC_SECRET:
      secretName: persai-api-secrets
      secretKey: ADMIN_STEP_UP_HMAC_SECRET
      optional: true
    RUNTIME_PROVIDER_SECRETS_MASTER_KEY:
      secretName: persai-api-secrets
      secretKey: RUNTIME_PROVIDER_SECRETS_MASTER_KEY
      optional: true
    PERSAI_INTERNAL_API_TOKEN:
      secretName: persai-runtime-secrets
      secretKey: PERSAI_INTERNAL_API_TOKEN
    # ADR-149 / ADR-140 — cross-replica turn-stop + browser-bridge coordination.
    # Reuses runtime Redis so Stop and orphan ownership work across api replicas.
    BROWSER_BRIDGE_REDIS_URL:
      secretName: persai-runtime-secrets
      secretKey: PERSAI_RUNTIME_SPEC_STORE_REDIS_URL
      optional: true
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  scheduling:
    nodeSelector: {}
    tolerations: []
  autoscaling:
    # Keep HPA explicit but disabled until SR3 owns request-path and dependency
    # scaling behavior under real target-environment evidence.
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
  service:
    type: ClusterIP
    port: 3001
  # GKE Ingress (GCLB): Telegram webhooks and long native turns exceed the
  # default ~30s backend timeout without an explicit BackendConfig on `api`.
  backendConfig:
    enabled: false
    name: persai-api-backend-config
    timeoutSec: 3600
  internalService:
    enabled: true
    port: 3002
  telegramWebhook:
    enabled: false

web:
  enabled: true
  replicaCount: 2
  revisionHistoryLimit: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  image:
    name: web
    tag: ""
    pullPolicy: IfNotPresent
  env:
    NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ""
    NEXT_PUBLIC_CLERK_JS_URL: "/clerk-proxy/npm/@clerk/clerk-js@6.22.0/dist/clerk.browser.js"
    NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
    NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
  secretEnv:
    CLERK_SECRET_KEY:
      secretName: persai-api-secrets
      secretKey: CLERK_SECRET_KEY
  probes:
    readiness:
      path: /api/ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /api/health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    # Keep HPA explicit but disabled until SR2 has deploy/observe evidence for
    # web scaling behavior in the target environment.
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
  service:
    type: ClusterIP
    port: 3000
  # GKE Ingress (GCLB): default backend timeout is ~30s; SSE chat/image tools need longer.
  backendConfig:
    enabled: false
    name: persai-web-backend-config
    timeoutSec: 3600

providerGateway:
