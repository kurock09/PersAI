global:
  namespace: persai-dev
  images:
    registryHost: europe-west1-docker.pkg.dev
    projectId: project-44786b14-b7d7-4554-a8a
    repository: persai
    tag: dev-main

api:
  enabled: true
  replicaCount: 1
  migrations:
    enabled: true
    backoffLimit: 1
  serviceAccount:
    create: true
    name: api-sa
    gcpServiceAccountEmail: ""
  image:
    name: api
    tag: ""
    pullPolicy: IfNotPresent
  cloudSqlProxy:
    enabled: false
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.18.3
    port: 5432
    instanceConnectionName: ""
    usePrivateIp: true
  env:
    APP_ENV: dev
    PORT: "3001"
    LOG_LEVEL: info
    GCP_PROJECT_ID: ""
    GCP_REGION: ""
    OPENCLAW_ADAPTER_ENABLED: "false"
    OPENCLAW_BASE_URL: "http://openclaw:18789"
    WEB_ACTIVE_CHATS_CAP: "20"
    QUOTA_TOKEN_BUDGET_DEFAULT: "200000"
    QUOTA_COST_OR_TOKEN_DRIVING_TOOL_UNITS_DEFAULT: "1000"
  secretEnv:
    DATABASE_URL:
      secretName: persai-api-secrets
      secretKey: DATABASE_URL
    CLERK_SECRET_KEY:
      secretName: persai-api-secrets
      secretKey: CLERK_SECRET_KEY
    ADMIN_STEP_UP_HMAC_SECRET:
      secretName: persai-api-secrets
      secretKey: ADMIN_STEP_UP_HMAC_SECRET
      optional: true
    RUNTIME_PROVIDER_SECRETS_MASTER_KEY:
      secretName: persai-api-secrets
      secretKey: RUNTIME_PROVIDER_SECRETS_MASTER_KEY
      optional: true
    OPENCLAW_GATEWAY_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: OPENCLAW_GATEWAY_TOKEN
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  service:
    type: ClusterIP
    port: 3001

web:
  enabled: true
  replicaCount: 1
  image:
    name: web
    tag: ""
    pullPolicy: IfNotPresent
  env:
    NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ""
  secretEnv:
    CLERK_SECRET_KEY:
      secretName: persai-api-secrets
      secretKey: CLERK_SECRET_KEY
  probes:
    readiness:
      path: /api/ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      path: /api/health
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  service:
    type: ClusterIP
    port: 3000

openclaw:
  enabled: false
  replicaCount: 1
  serviceAccount:
    create: false
    name: openclaw-sa
    gcpServiceAccountEmail: ""
  image:
    name: openclaw
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  configPath: /app/openclaw-dev.json
  controlUi:
    allowedOrigins:
      - http://localhost:18789
      - http://127.0.0.1:18789
    dangerouslyAllowHostHeaderOriginFallback: false
  persaiSecretResolver:
    baseUrl: http://api:3001
  workspace:
    gcsFuse:
      enabled: false
      bucketName: ""
      mountPath: /mnt/workspaces/persai
      mountOptions: ""
  command:
    - node
    - openclaw.mjs
    - gateway
  args:
    - --bind
    - loopback
    - --port
    - "18789"
  env:
    TZ: UTC
  secretEnv:
    OPENCLAW_GATEWAY_TOKEN:
      secretName: persai-openclaw-secrets
      secretKey: OPENCLAW_GATEWAY_TOKEN
  service:
    type: ClusterIP
    port: 18789
