services:
  postgres:
    image: postgres:16-alpine
    container_name: persai-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: persai_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d persai_v2"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - persai_postgres_data:/var/lib/postgresql/data

volumes:
  persai_postgres_data:
